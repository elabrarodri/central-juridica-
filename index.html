// ── VIEW PENDÊNCIAS ────────────────────────────────────────────────────────
function PendenciasView({ pends, onSave, onDelete, onToggle }) {
  const [modal, setModal] = useState(null);
  const [del, setDel] = useState(null);
  const [busca, setBusca] = useState('');
  const [filtro, setFiltro] = useState('pendente');
  const [filtroPri, setFiltroPri] = useState('todos');
  const [view, setView] = useState('kanban');
  const [dragging, setDragging] = useState(null);
  const pendentes = pends.filter(p=>p.status==='pendente').length;

  // Colunas kanban: prioridade alta/media/baixa + concluído
  const COLS_PEND = [
    {k:'alta',   label:'🔴 Alta Prioridade',  color:'text-red-700',    border:'border-red-400',    bg:'bg-red-50',    badge:'bg-red-500'},
    {k:'media',  label:'🟡 Média Prioridade', color:'text-yellow-700', border:'border-yellow-400', bg:'bg-yellow-50', badge:'bg-yellow-500'},
    {k:'baixa',  label:'🟢 Baixa Prioridade', color:'text-green-700',  border:'border-green-400',  bg:'bg-green-50',  badge:'bg-green-500'},
    {k:'concluido', label:'✅ Concluídos',     color:'text-gray-600',   border:'border-gray-400',   bg:'bg-gray-100',  badge:'bg-gray-400'},
  ];

  function handleDrop(colKey) {
    if (!dragging) return;
    const item = pends.find(p=>p.id===dragging);
    if (!item) return;
    if (colKey === 'concluido') {
      onSave({...item, status:'concluido'});
    } else {
      onSave({...item, prioridade: colKey, status:'pendente'});
    }
    setDragging(null);
  }

  const filtered = useMemo(()=>pends.filter(p=>{
    if(filtro!=='todos'&&p.status!==filtro) return false;
    if(filtroPri!=='todos'&&p.prioridade!==filtroPri) return false;
    const q=busca.toLowerCase();
    return !q||[p.cliente,p.tipo,p.descricao,p.processo||''].some(s=>s.toLowerCase().includes(q));
  }).sort((a,b)=>{
    if(a.status!==b.status) return a.status==='concluido'?1:-1;
    const po={alta:0,media:1,baixa:2}; if(a.prioridade!==b.prioridade) return po[a.prioridade]-po[b.prioridade];
    return (a.dataLimite||'9999')>(b.dataLimite||'9999')?1:-1;
  }),[pends,busca,filtro,filtroPri]);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div><h2 className="font-bold text-gray-700">Pendências de Clientes</h2><p className="text-xs text-gray-400">{pendentes} pendente{pendentes!==1?'s':''}</p></div>
        <div className="flex items-center gap-2">
          <div className="flex rounded-xl border border-gray-300 overflow-hidden text-xs font-semibold">
            <button onClick={()=>setView('lista')} className={`px-3 py-1.5 transition ${view==='lista'?'bg-indigo-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>☰ Lista</button>
            <button onClick={()=>setView('kanban')} className={`px-3 py-1.5 transition ${view==='kanban'?'bg-indigo-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>⬛ Kanban</button>
          </div>
          <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition">+ Nova</button>
        </div>
      </div>

      {view==='lista' && <>
        <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/>
        <div className="flex gap-2 flex-wrap">
          {[{k:'pendente',l:'Pendentes'},{k:'concluido',l:'Concluídos'},{k:'todos',l:'Todos'}].map(f=>(
            <button key={f.k} onClick={()=>setFiltro(f.k)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtro===f.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>{f.l}</button>
          ))}
          <span className="text-gray-300">|</span>
          {[{k:'todos',l:'Todas'},{k:'alta',l:'🔴 Alta'},{k:'media',l:'🟡 Média'},{k:'baixa',l:'🟢 Baixa'}].map(f=>(
            <button key={f.k} onClick={()=>setFiltroPri(f.k)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtroPri===f.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>{f.l}</button>
          ))}
        </div>
        {filtered.length===0?<div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">✅</p><p className="font-semibold">Nenhuma pendência encontrada</p></div>:
          <div className="grid sm:grid-cols-2 gap-3">{filtered.map(p=><PendCard key={p.id} pend={p} onEdit={setModal} onDelete={id=>setDel(id)} onToggle={onToggle}/>)}</div>}
      </>}

      {view==='kanban' && (
        <div className="overflow-x-auto pb-2">
          <div className="flex gap-3" style={{minWidth: 900}}>
            {COLS_PEND.map(col=>{
              const items = col.k==='concluido'
                ? pends.filter(p=>p.status==='concluido')
                : pends.filter(p=>p.status==='pendente'&&p.prioridade===col.k);
              return <div key={col.k} className="flex-1" style={{minWidth:210}}>
                <KanbanCol title={col.label} color={col.color} borderColor={col.border} bgColor={col.bg} badgeColor={col.badge}
                  items={items} onDrop={()=>handleDrop(col.k)} emptyMsg="Arraste um card aqui"
                  renderCard={item=><KanbanPendCard key={item.id} pend={item} onDragStart={setDragging} onEdit={setModal} onToggle={onToggle}/>}/>
              </div>;
            })}
          </div>
          <p className="text-xs text-gray-400 mt-2 text-center">💡 Arraste os cards entre as colunas para mudar a prioridade ou marcar como concluído</p>
        </div>
      )}

      {modal&&<PendModal initial={modal==='new'?null:modal} onSave={p=>{onSave(p);setModal(null);}} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDelete(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>
  );
}

// ── MODAL INICIAL ──────────────────────────────────────────────────────────
const emptyInic = { cliente:'', cpf:'', email:'', whatsapp:'', endereco:'', tipoAcao:'', dataDFato:'', tribunal:'', vara:'', numeroProcesso:'', dataPrazo:'', status:'em_preparo', valorCausa:'', observacoes:'', docsColetados:[] };
function InicModal({ initial, onSave, onClose }) {
  const [f, setF] = useState(initial||emptyInic);
  const [e, setE] = useState({});
  const [docsColetados, setDocsColetados] = useState(initial?.docsColetados||[]);
  const set = k => v => setF(p=>({...p,[k]:v}));
  function toggleDoc(doc) { setDocsColetados(prev=>prev.includes(doc)?prev.filter(d=>d!==doc):[...prev,doc]); }
  function validate(){ const err={}; if(!f.cliente.trim())err.cliente='Obrigatório'; if(!f.tipoAcao)err.tipoAcao='Obrigatório'; return err; }
  function submit(ev){
    ev.preventDefault();
    const err=validate();
    if(Object.keys(err).length){setE(err);return;}
    const docs = DOCS_POR_ACAO[f.tipoAcao]||[];
    const pendentes = docs.filter(d=>!docsColetados.includes(d));
    const obsBase = (f.observacoes||'').replace(/\n*📋 Docs[^\n]*:\n(☐[^\n]*\n?)*/g,'').trim();
    const obsFinal = pendentes.length>0
      ? (obsBase?obsBase+'\n\n':'')+'📋 Docs pendentes ('+pendentes.length+'/'+docs.length+'):\n'+pendentes.map(d=>'☐ '+d).join('\n')
      : obsBase;
    onSave({...f, observacoes:obsFinal, docsColetados, id:initial?.id||Date.now()});
  }
  const docs = DOCS_POR_ACAO[f.tipoAcao]||[];
  const coletadosCount = docs.filter(d=>docsColetados.includes(d)).length;
  const todosColetados = docs.length>0 && coletadosCount===docs.length;
  const presc = f.tipoAcao && f.dataDFato ? (()=>{
    const p = PRESCRICAO_MAP[f.tipoAcao];
    if(!p) return null;
    if(p.imp) return {imprescritivel:true,label:p.label,obs:p.obs||''};
    const inicio = parseDate(f.dataDFato);
    if(!inicio) return null;
    const dl = new Date(inicio);
    if(p.anos) dl.setFullYear(dl.getFullYear()+p.anos);
    else if(p.meses) dl.setMonth(dl.getMonth()+p.meses);
    else if(p.dias) dl.setDate(dl.getDate()+p.dias);
    const diff = Math.ceil((dl-today())/86400000);
    return {deadline:dl,diffDias:diff,label:p.label,base:p.base||''};
  })() : null;
  return <Overlay onClose={onClose}><ModalBox title={initial?'Editar Inicial':'Nova Inicial Pendente'} onClose={onClose}>
    <form onSubmit={submit} className="space-y-3">
      {/* Dados do cliente */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 space-y-2">
        <p className="text-xs font-bold text-blue-700 uppercase tracking-wide">👤 Dados do Cliente</p>
        <Field label="Nome do cliente *" error={e.cliente}><Inp value={f.cliente} onChange={ev=>set('cliente')(ev.target.value)} placeholder="Nome completo" cls={e.cliente?'border-red-400':''}/></Field>
        <div className="grid grid-cols-2 gap-2">
          <Field label="CPF"><Inp value={f.cpf} onChange={ev=>set('cpf')(ev.target.value)} placeholder="000.000.000-00"/></Field>
          <Field label="WhatsApp"><Inp value={f.whatsapp} onChange={ev=>set('whatsapp')(ev.target.value)} placeholder="(11) 99999-9999"/></Field>
        </div>
        <Field label="E-mail"><Inp value={f.email} onChange={ev=>set('email')(ev.target.value)} placeholder="email@exemplo.com"/></Field>
        <Field label="Endereço"><Inp value={f.endereco} onChange={ev=>set('endereco')(ev.target.value)} placeholder="Rua, número, bairro, cidade"/></Field>
      </div>

      {/* Tipo de ação + Status */}
      <div className="grid grid-cols-2 gap-2">
        <Field label="Tipo de Ação *" error={e.tipoAcao}>
          <select value={f.tipoAcao} onChange={ev=>set('tipoAcao')(ev.target.value)}
            className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white ${e.tipoAcao?'border-red-400':'border-gray-300'}`}>
            <option value="">Selecione a área e ação...</option>
            {AREAS_ACOES.map(a=><optgroup key={a.area} label={a.area}>{a.acoes.map(ac=><option key={ac} value={ac}>{ac}</option>)}</optgroup>)}
          </select>
        </Field>
        <Field label="Status"><Sel value={f.status} onChange={ev=>set('status')(ev.target.value)}>{Object.entries(STATUS_INICIAL).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</Sel></Field>
      </div>

      {/* Documentos a providenciar — aparece logo ao selecionar o tipo */}
      {docs.length>0&&(
        <div className={`rounded-xl border p-3 ${todosColetados?'bg-green-50 border-green-300':'bg-amber-50 border-amber-300'}`}>
          <div className="flex items-center justify-between mb-2">
            <p className={`text-xs font-bold uppercase tracking-wide ${todosColetados?'text-green-700':'text-amber-700'}`}>
              📋 Documentos a providenciar
            </p>
            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${todosColetados?'bg-green-500 text-white':'bg-amber-500 text-white'}`}>
              {coletadosCount}/{docs.length} coletados
            </span>
          </div>
          <ul className="space-y-1.5">
            {docs.map((d,i)=>{
              const coletado = docsColetados.includes(d);
              return (
                <li key={i} className="flex items-start gap-2 cursor-pointer" onClick={()=>toggleDoc(d)}>
                  <input type="checkbox" checked={coletado} onChange={()=>toggleDoc(d)} className="mt-0.5 w-3.5 h-3.5 flex-shrink-0 accent-green-600" onClick={e=>e.stopPropagation()}/>
                  <span className={`text-xs leading-relaxed select-none ${coletado?'line-through text-gray-400':'text-amber-900'}`}>{d}</span>
                </li>
              );
            })}
          </ul>
          {todosColetados&&<p className="text-xs text-green-600 font-semibold mt-2">✓ Todos os documentos coletados — inicial pronta para distribuir!</p>}
        </div>
      )}

      {/* Demais campos */}
      <Field label="Data do fato / evento gerador"><Inp type="date" value={f.dataDFato} onChange={ev=>set('dataDFato')(ev.target.value)}/></Field>
      {presc&&<div className={`rounded-lg p-2 text-xs border ${presc.imprescritivel?'bg-green-50 border-green-300 text-green-700':presc.diffDias<0?'bg-red-100 border-red-400 text-red-700':presc.diffDias<=90?'bg-orange-100 border-orange-400 text-orange-700':'bg-yellow-50 border-yellow-300 text-yellow-700'}`}>
        <span className="font-bold">⏱ Prescrição: {presc.label}</span>
        {presc.base&&<span className="ml-1 opacity-75">({presc.base})</span>}
        {presc.imprescritivel&&presc.obs&&<span className="ml-1 opacity-75">— {presc.obs}</span>}
        {!presc.imprescritivel&&presc.deadline&&<span className="ml-1">— {presc.diffDias<0?'PRESCRITO!':presc.diffDias+' dias restantes'} (vence {presc.deadline.toLocaleDateString('pt-BR')})</span>}
      </div>}
      <div className="grid grid-cols-2 gap-2">
        <Field label="Tribunal"><Sel value={f.tribunal} onChange={ev=>set('tribunal')(ev.target.value)}><option value="">Selecione...</option>{TRIBUNAIS.map(t=><option key={t}>{t}</option>)}</Sel></Field>
        <Field label="Valor da causa"><Inp value={f.valorCausa} onChange={ev=>set('valorCausa')(ev.target.value)} placeholder="R$ 0,00"/></Field>
      </div>
      <Field label="Vara / Juízo pretendido"><Inp value={f.vara} onChange={ev=>set('vara')(ev.target.value)} placeholder="Ex: Vara de Família"/></Field>
      <Field label="Número do processo (após distribuição)"><Inp value={f.numeroProcesso||''} onChange={ev=>set('numeroProcesso')(ev.target.value)} placeholder="0000000-00.0000.8.26.0000"/></Field>
      <Field label="Data limite p/ distribuir"><Inp type="date" value={f.dataPrazo} onChange={ev=>set('dataPrazo')(ev.target.value)}/></Field>
      <Field label="Observações"><Txta value={f.observacoes} onChange={ev=>set('observacoes')(ev.target.value)} placeholder="Anotações..." rows={2}/></Field>
      <MFooter onClose={onClose}/>
    </form>
  </ModalBox></Overlay>;
}

// ── CARD INICIAL ───────────────────────────────────────────────────────────
function InicCard({ inic, onEdit, onDelete, onChangeStatus }) {
  const st = STATUS_INICIAL[inic.status]||STATUS_INICIAL.em_preparo;
  const vencido = inic.dataPrazo && parseDate(inic.dataPrazo) < today() && inic.status!=='distribuida';
  const NEXT = { em_preparo:'aguardando_docs', aguardando_docs:'pronta', pronta:'distribuida' };
  const nextStatus = NEXT[inic.status];
  const nextLabel = nextStatus ? STATUS_INICIAL[nextStatus]?.label : null;
  const presc = calcPrescricao(inic);
  return (
    <div className={`rounded-xl border-l-4 ${st.border} ${inic.status==='distribuida'?'bg-gray-50 opacity-75':vencido?'bg-red-50':st.bg} p-4 shadow-sm flex flex-col gap-2`}>
      <div className="flex items-start justify-between gap-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-1.5 flex-wrap mb-1">
            <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${st.badge}`}>{st.label}</span>
            {vencido&&<span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">Vencido!</span>}
            {presc&&!presc.imprescritivel&&presc.diffDias<=180&&
              <span className={`text-xs px-2 py-0.5 rounded-full font-bold text-white ${presc.diffDias<0?'bg-red-600':presc.diffDias<=90?'bg-orange-500':'bg-yellow-500'}`}>
                {presc.diffDias<0?'⏱ PRESCRITO':'⏱ '+presc.diffDias+'d p/ prescrever'}
              </span>}
          </div>
          <p className="font-bold text-gray-800 text-sm">{inic.cliente}</p>
          <p className="text-xs text-indigo-600 font-medium">{inic.tipoAcao}</p>
          {inic.numeroProcesso&&<p className="text-xs text-gray-500 font-mono mt-0.5">📋 {inic.numeroProcesso}</p>}
          {inic.whatsapp&&<p className="text-xs text-gray-400">📱 {inic.whatsapp}</p>}
        </div>
        <div className="text-right shrink-0">
          {inic.dataPrazo&&<><p className="text-xs text-gray-400">Distribuir até:</p><p className="text-xs font-bold text-gray-700">{fmtDate(inic.dataPrazo)}</p></>}
          {inic.valorCausa&&<p className="text-xs text-gray-400 mt-1">{inic.valorCausa}</p>}
        </div>
      </div>
      {(inic.tribunal||inic.vara)&&<p className="text-xs text-gray-400">{[inic.tribunal,inic.vara].filter(Boolean).join(' — ')}</p>}
      {inic.observacoes&&<p className="text-xs text-gray-600 border-t pt-2 line-clamp-2">{inic.observacoes}</p>}
      <div className="flex items-center gap-1.5 pt-1 border-t flex-wrap">
        {nextLabel&&<button onClick={()=>onChangeStatus(inic.id,nextStatus)} className="text-xs px-2.5 py-1 rounded-lg border border-green-400 text-green-700 hover:bg-green-50 font-medium transition">→ {nextLabel}</button>}
        <button onClick={()=>onEdit(inic)} className="text-xs px-2.5 py-1 rounded-lg border border-indigo-300 text-indigo-600 hover:bg-indigo-50 font-medium transition">Editar</button>
        <button onClick={()=>onDelete(inic.id)} className="text-xs px-2.5 py-1 rounded-lg border border-red-200 text-red-400 hover:bg-red-50 font-medium transition ml-auto">Excluir</button>
      </div>
    </div>
  );
}

// ── VIEW INICIAIS ──────────────────────────────────────────────────────────
function IniciaisView({ inics, onSave, onDelete, onChangeStatus, clientes, onSaveCliente }) {
  const [modal, setModal] = useState(null);
  const [del, setDel] = useState(null);
  const [busca, setBusca] = useState('');
  const [filtro, setFiltro] = useState('ativas');
  const [view, setView] = useState('kanban');
  const [dragging, setDragging] = useState(null);
  const [clienteMsg, setClienteMsg] = useState(null);
  const [distModal, setDistModal] = useState(null); // { inic }
  const [distNumProc, setDistNumProc] = useState('');

  function registrarClienteDistribuido(inic, numProc) {
    if (!inic.cliente.trim() || !onSaveCliente) return;
    const cpfLimpo = (inic.cpf||'').replace(/\D/g,'');
    const existing = (clientes||[]).find(c=>
      c.nome.toLowerCase().trim()===inic.cliente.toLowerCase().trim()||
      (cpfLimpo&&c.cpfCnpj&&c.cpfCnpj.replace(/\D/g,'')===cpfLimpo)
    );
    const hoje = new Date().toLocaleDateString('pt-BR');
    const numNorm = (numProc||'').trim();
    if (existing) {
      const processosList = existing.processos||[];
      const novosProcs = numNorm && !processosList.includes(numNorm) ? [...processosList, numNorm] : processosList;
      const novaObs = (existing.observacoes?existing.observacoes.trim()+'\n':'')+
        `[${hoje}] Novo caso distribuído: ${inic.tipoAcao}${numNorm?' — Proc. '+numNorm:''}`;
      onSaveCliente({...existing, processos:novosProcs, observacoes:novaObs,
        telefone:existing.telefone||inic.whatsapp||'', email:existing.email||inic.email||'', endereco:existing.endereco||inic.endereco||''});
      setClienteMsg({tipo:'atualizado', nome:existing.nome, processo:numNorm});
    } else {
      onSaveCliente({id:Date.now(), nome:inic.cliente.trim(), cpfCnpj:inic.cpf||'',
        telefone:inic.whatsapp||'', email:inic.email||'', endereco:inic.endereco||'',
        processos: numNorm?[numNorm]:[],
        observacoes:`[${hoje}] Distribuído: ${inic.tipoAcao}${numNorm?' — Proc. '+numNorm:''}`});
      setClienteMsg({tipo:'criado', nome:inic.cliente.trim(), processo:numNorm});
    }
    setTimeout(()=>setClienteMsg(null), 5000);
  }

  function handleChangeStatus(id, newStatus) {
    if (newStatus === 'distribuida') {
      const inic = inics.find(x=>x.id===id);
      if (inic?.numeroProcesso) {
        onChangeStatus(id, newStatus);
        registrarClienteDistribuido(inic, inic.numeroProcesso);
      } else {
        setDistNumProc('');
        setDistModal(inic);
      }
    } else {
      onChangeStatus(id, newStatus);
    }
  }

  function confirmarDistribuicao() {
    if (!distModal) return;
    onChangeStatus(distModal.id, 'distribuida');
    if (distNumProc.trim()) onSave({...distModal, status:'distribuida', numeroProcesso:distNumProc.trim()});
    registrarClienteDistribuido(distModal, distNumProc);
    setDistModal(null);
  }

  function handleSave(inic) {
    onSave(inic);
    setModal(null);
  }
  const counts = useMemo(()=>{ const c={em_preparo:0,aguardando_docs:0,pronta:0,distribuida:0}; inics.forEach(i=>c[i.status]++); return c; },[inics]);

  const COLS_INIC = [
    {k:'em_preparo',    label:'📝 Em preparo',          color:'text-blue-700',   border:'border-blue-400',   bg:'bg-blue-50',   badge:'bg-blue-500'},
    {k:'aguardando_docs',label:'📂 Aguardando docs',    color:'text-yellow-700', border:'border-yellow-400', bg:'bg-yellow-50', badge:'bg-yellow-500'},
    {k:'pronta',        label:'✅ Pronta p/ distribuir', color:'text-green-700',  border:'border-green-400',  bg:'bg-green-50',  badge:'bg-green-500'},
    {k:'distribuida',   label:'🏛️ Distribuída',          color:'text-gray-600',   border:'border-gray-400',   bg:'bg-gray-100',  badge:'bg-gray-400'},
  ];

  function handleDrop(colKey) {
    if (!dragging) return;
    handleChangeStatus(dragging, colKey);
    setDragging(null);
  }

  const filtered = useMemo(()=>inics.filter(i=>{
    if(filtro==='ativas'&&i.status==='distribuida') return false;
    if(filtro!=='ativas'&&filtro!=='todas'&&i.status!==filtro) return false;
    const q=busca.toLowerCase();
    return !q||[i.cliente,i.tipoAcao,i.tribunal||'',i.vara||'',i.observacoes||''].some(s=>s.toLowerCase().includes(q));
  }).sort((a,b)=>{
    if(a.status==='distribuida'!==b.status==='distribuida') return a.status==='distribuida'?1:-1;
    return (a.dataPrazo||'9999')>(b.dataPrazo||'9999')?1:-1;
  }),[inics,busca,filtro]);

  const FILTROS=[{k:'ativas',l:'Ativas'},{k:'em_preparo',l:'Em preparo',n:counts.em_preparo},{k:'aguardando_docs',l:'Aguard. docs',n:counts.aguardando_docs},{k:'pronta',l:'Prontas',n:counts.pronta},{k:'distribuida',l:'Distribuídas',n:counts.distribuida},{k:'todas',l:'Todas'}];

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div><h2 className="font-bold text-gray-700">Iniciais Pendentes de Distribuição</h2><p className="text-xs text-gray-400">{inics.filter(i=>i.status!=='distribuida').length} ação(ões) em andamento</p></div>
        <div className="flex items-center gap-2">
          <div className="flex rounded-xl border border-gray-300 overflow-hidden text-xs font-semibold">
            <button onClick={()=>setView('lista')} className={`px-3 py-1.5 transition ${view==='lista'?'bg-indigo-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>☰ Lista</button>
            <button onClick={()=>setView('kanban')} className={`px-3 py-1.5 transition ${view==='kanban'?'bg-indigo-600 text-white':'bg-white text-gray-600 hover:bg-gray-50'}`}>⬛ Kanban</button>
          </div>
          <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition">+ Nova</button>
        </div>
      </div>

      <div className="grid grid-cols-4 gap-2">
        {[{l:'Em preparo',k:'em_preparo',c:'text-blue-600',bg:'bg-blue-50 border-blue-200'},{l:'Aguard. docs',k:'aguardando_docs',c:'text-yellow-600',bg:'bg-yellow-50 border-yellow-200'},{l:'Prontas',k:'pronta',c:'text-green-600',bg:'bg-green-50 border-green-200'},{l:'Distribuídas',k:'distribuida',c:'text-gray-500',bg:'bg-gray-50 border-gray-200'}].map(card=>(
          <div key={card.k} className={`rounded-xl border p-2 text-center ${card.bg}`}>
            <p className={`text-xl font-black ${card.c}`}>{counts[card.k]}</p>
            <p className="text-xs text-gray-500 font-medium leading-tight">{card.l}</p>
          </div>
        ))}
      </div>

      {view==='lista' && <>
        <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/>
        <div className="flex gap-2 flex-wrap">{FILTROS.map(f=><button key={f.k} onClick={()=>setFiltro(f.k)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtro===f.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>{f.l}{f.n!==undefined?` (${f.n})`:''}</button>)}</div>
        {filtered.length===0?<div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">📄</p><p className="font-semibold">Nenhuma inicial encontrada</p></div>:
          <div className="grid sm:grid-cols-2 gap-3">{filtered.map(i=><InicCard key={i.id} inic={i} onEdit={setModal} onDelete={id=>setDel(id)} onChangeStatus={handleChangeStatus}/>)}</div>}
      </>}

      {view==='kanban' && (
        <div className="overflow-x-auto pb-2">
          <div className="flex gap-3" style={{minWidth:900}}>
            {COLS_INIC.map(col=>{
              const items = inics.filter(i=>i.status===col.k);
              return <div key={col.k} className="flex-1" style={{minWidth:210}}>
                <KanbanCol title={col.label} color={col.color} borderColor={col.border} bgColor={col.bg} badgeColor={col.badge}
                  items={items} onDrop={()=>handleDrop(col.k)} emptyMsg="Arraste um card aqui"
                  renderCard={item=><KanbanInicCard key={item.id} inic={item} onDragStart={setDragging} onEdit={setModal}/>}/>
              </div>;
            })}
          </div>
          <p className="text-xs text-gray-400 mt-2 text-center">💡 Arraste os cards entre as colunas para avançar o status da ação</p>
        </div>
      )}

      {clienteMsg&&<div className={`fixed bottom-5 right-5 z-50 px-4 py-3 rounded-xl shadow-lg text-sm font-semibold text-white max-w-xs ${clienteMsg.tipo==='criado'?'bg-green-600':'bg-indigo-600'}`}>
        <p>{clienteMsg.tipo==='criado'?'✅ Cliente criado:':'🔄 Cliente atualizado:'} {clienteMsg.nome}</p>
        {clienteMsg.processo&&<p className="text-xs font-mono mt-0.5 opacity-90">Proc. {clienteMsg.processo}</p>}
      </div>}

      {/* Modal de distribuição — pede número do processo */}
      {distModal&&<Overlay onClose={()=>setDistModal(null)}>
        <ModalBox title="🏛️ Distribuindo inicial" onClose={()=>setDistModal(null)}>
          <div className="space-y-4">
            <div className="bg-green-50 border border-green-200 rounded-xl p-3">
              <p className="text-sm font-bold text-green-800">{distModal.cliente}</p>
              <p className="text-xs text-green-600 mt-0.5">{distModal.tipoAcao}</p>
              {distModal.tribunal&&<p className="text-xs text-green-500 mt-0.5">{distModal.tribunal}{distModal.vara?' — '+distModal.vara:''}</p>}
            </div>
            <Field label="Número do processo (CNJ)">
              <Inp value={distNumProc} onChange={e=>setDistNumProc(e.target.value)} placeholder="0000000-00.0000.8.26.0000" autoFocus/>
            </Field>
            <p className="text-xs text-gray-400">O cliente será criado ou atualizado automaticamente na aba Clientes com este processo vinculado.</p>
            <div className="flex gap-2 justify-end">
              <button onClick={()=>setDistModal(null)} className="px-4 py-2 rounded-lg border border-gray-300 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
              <button onClick={confirmarDistribuicao} className="px-5 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700 transition">🏛️ Confirmar distribuição</button>
            </div>
          </div>
        </ModalBox>
      </Overlay>}

      {modal&&<InicModal initial={modal==='new'?null:modal} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDelete(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>

// ── MODAL HONORÁRIO ────────────────────────────────────────────────────────
const emptyHonor = { cliente:'', processo:'', descricao:'', tipo:'Honorários contratuais', valorCombinado:'', valorPago:'', vencimento:'', status:'pendente', observacoes:'', numParcelas:'', parcelasPagas:'', valorEntrada:'', numParcelasMisto:'', dataPrimeiraParcela:'' };
function fmtMoeda(v) {
  const n = String(v).replace(/\D/g,'');
  if (!n) return '';
  const num = (parseInt(n,10)/100).toFixed(2);
  return num.replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function parseMoeda(v) { return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0; }
function HonorModal({ initial, onSave, onClose }) {
  const fmtInit = o => o ? {...o,
    valorCombinado: o.valorCombinado ? fmtMoeda(Math.round((o.valorCombinado||0)*100)) : '',
    valorPago: o.valorPago ? fmtMoeda(Math.round((o.valorPago||0)*100)) : '',
    valorEntrada: o.valorEntrada ? fmtMoeda(Math.round((o.valorEntrada||0)*100)) : '',
    numParcelasMisto: o.numParcelasMisto||'',
    dataPrimeiraParcela: o.dataPrimeiraParcela||''
  } : emptyHonor;
  const [f, setF] = useState(fmtInit(initial));
  const [e, setE] = useState({});
  const set = k => v => setF(p=>({...p,[k]:v}));
  const setMoeda = k => ev => { const v=ev.target.value.replace(/\D/g,''); setF(p=>({...p,[k]:fmtMoeda(v)})); };
  const isParcelado = f.status === 'parcelado';
  const isMisto = f.status === 'misto';
  const valTotal = parseMoeda(f.valorCombinado);
  const numParc = parseInt(f.numParcelas) || 0;
  const parcelaPagas = parseInt(f.parcelasPagas) || 0;
  const valorParcela = numParc > 0 ? valTotal / numParc : 0;
  const valorPagoCalc = isParcelado && numParc > 0 ? parcelaPagas * valorParcela : null;
  const valEntrada = parseMoeda(f.valorEntrada||'0');
  const numMisto = parseInt(f.numParcelasMisto)||0;
  const valRestante = valTotal - valEntrada;
  const valParcMisto = numMisto > 0 && valRestante > 0 ? valRestante / numMisto : 0;
  function addMonths(dateStr, n) {
    if(!dateStr) return '';
    const d = new Date(dateStr+'T00:00:00');
    d.setMonth(d.getMonth()+n);
    return d.toISOString().slice(0,10);
  }
  function validate(){
    const err={};
    if(!f.cliente.trim())err.cliente='Obrigatório';
    if(!f.descricao.trim())err.descricao='Obrigatório';
    if(!f.valorCombinado)err.valorCombinado='Obrigatório';
    if(isParcelado&&!f.numParcelas)err.numParcelas='Obrigatório';
    if(isMisto){
      if(!f.valorEntrada)err.valorEntrada='Obrigatório';
      if(!f.numParcelasMisto)err.numParcelasMisto='Obrigatório';
      if(!f.dataPrimeiraParcela)err.dataPrimeiraParcela='Obrigatório';
    }
    return err;
  }
  function submit(ev){
    ev.preventDefault();
    const err=validate();
    if(Object.keys(err).length){setE(err);return;}
    if(isMisto){
      const ts = Date.now();
      const base = { cliente:f.cliente, processo:f.processo, tipo:f.tipo, observacoes:f.observacoes, status:'pendente', valorPago:0 };
      const records = [
        {...base, id:ts, descricao:`Entrada – ${f.descricao}`, valorCombinado:valEntrada, vencimento:f.vencimento||f.dataPrimeiraParcela},
        ...Array.from({length:numMisto},(_,i)=>({
          ...base, id:ts+i+1, descricao:`Parcela ${i+1}/${numMisto} – ${f.descricao}`,
          valorCombinado:valParcMisto, vencimento:addMonths(f.dataPrimeiraParcela,i)
        }))
      ];
      onSave(records);
    } else {
      const vPago = isParcelado && valorPagoCalc !== null ? valorPagoCalc : parseMoeda(f.valorPago||'0');
      onSave({...f, id:initial?.id||Date.now(), valorCombinado:valTotal, valorPago:vPago, numParcelas:numParc||undefined, parcelasPagas:parcelaPagas||undefined });
    }
  }
  return <Overlay onClose={onClose}><ModalBox title={initial?'Editar Lançamento':'Novo Lançamento Financeiro'} onClose={onClose}>
    <form onSubmit={submit} className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <Field label="Cliente *" error={e.cliente}><Inp value={f.cliente} onChange={ev=>set('cliente')(ev.target.value)} placeholder="Nome do cliente" cls={e.cliente?'border-red-400':''}/></Field>
        <Field label="Tipo *"><Sel value={f.tipo} onChange={ev=>set('tipo')(ev.target.value)}>{TIPOS_HONOR.map(t=><option key={t}>{t}</option>)}</Sel></Field>
      </div>
      <Field label="Descrição *" error={e.descricao}><Inp value={f.descricao} onChange={ev=>set('descricao')(ev.target.value)} placeholder="Ex: Honorários – Ação de Alimentos" cls={e.descricao?'border-red-400':''}/></Field>
      <Field label="Processo vinculado"><Inp value={f.processo} onChange={ev=>set('processo')(ev.target.value)} placeholder="Opcional"/></Field>
      <Field label="Status"><Sel value={f.status} onChange={ev=>set('status')(ev.target.value)}>{Object.entries(STATUS_HONOR).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</Sel></Field>
      <div className="grid grid-cols-3 gap-3">
        <Field label="Valor total (R$) *" error={e.valorCombinado}><div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 font-medium">R$</span><Inp value={f.valorCombinado} onChange={setMoeda('valorCombinado')} placeholder="0,00" cls={`pl-8 ${e.valorCombinado?'border-red-400':''}`}/></div></Field>
        {!isParcelado&&!isMisto && <Field label="Valor recebido (R$)"><div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 font-medium">R$</span><Inp value={f.valorPago} onChange={setMoeda('valorPago')} placeholder="0,00" cls="pl-8"/></div></Field>}
        <Field label={isMisto?'Venc. entrada':'Vencimento'}><Inp type="date" value={f.vencimento} onChange={ev=>set('vencimento')(ev.target.value)}/></Field>
      </div>
      {isParcelado && (
        <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 space-y-3">
          <p className="text-xs font-bold text-purple-700">📦 Configuração do Parcelamento</p>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Nº de parcelas *" error={e.numParcelas}><Inp type="number" min="2" value={f.numParcelas} onChange={ev=>set('numParcelas')(ev.target.value)} placeholder="Ex: 6" cls={e.numParcelas?'border-red-400':''}/></Field>
            <Field label="Parcelas já pagas"><Inp type="number" min="0" value={f.parcelasPagas} onChange={ev=>set('parcelasPagas')(ev.target.value)} placeholder="0"/></Field>
          </div>
          {numParc > 0 && <div className="flex items-center gap-3 text-xs text-purple-700 font-medium"><span>Valor por parcela: <strong>{valorParcela.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</strong></span>{parcelaPagas > 0 && <span>Recebido: <strong>{(parcelaPagas*valorParcela).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</strong></span>}</div>}
        </div>
      )}
      {isMisto && (
        <div className="bg-teal-50 border border-teal-200 rounded-xl p-3 space-y-3">
          <p className="text-xs font-bold text-teal-700">💳 Entrada à Vista + Parcelas Mensais</p>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Entrada à vista (R$) *" error={e.valorEntrada}>
              <div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 font-medium">R$</span>
              <Inp value={f.valorEntrada} onChange={setMoeda('valorEntrada')} placeholder="0,00" cls={`pl-8 ${e.valorEntrada?'border-red-400':''}`}/></div>
            </Field>
            <Field label="Nº de parcelas *" error={e.numParcelasMisto}>
              <Inp type="number" min="1" value={f.numParcelasMisto} onChange={ev=>set('numParcelasMisto')(ev.target.value)} placeholder="Ex: 3" cls={e.numParcelasMisto?'border-red-400':''}/>
            </Field>
            <Field label="1ª parcela em *" error={e.dataPrimeiraParcela}>
              <Inp type="date" value={f.dataPrimeiraParcela} onChange={ev=>set('dataPrimeiraParcela')(ev.target.value)} cls={e.dataPrimeiraParcela?'border-red-400':''}/>
            </Field>
          </div>
          {valTotal > 0 && numMisto > 0 && (
            <div className="space-y-1.5">
              <p className="text-xs font-semibold text-teal-700">📋 Prévia dos lançamentos:</p>
              <div className="bg-white rounded-lg border border-teal-200 overflow-hidden text-xs">
                <div className="grid grid-cols-3 gap-2 px-3 py-1.5 bg-teal-100 font-bold text-teal-800"><span>Item</span><span>Valor</span><span>Vencimento</span></div>
                <div className="grid grid-cols-3 gap-2 px-3 py-1.5 text-gray-700 border-b border-teal-100">
                  <span className="font-semibold">Entrada</span>
                  <span className="text-teal-700 font-semibold">{valEntrada.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                  <span>{f.vencimento ? fmtDate(f.vencimento) : '—'}</span>
                </div>
                {Array.from({length:numMisto},(_,i)=>(
                  <div key={i} className={`grid grid-cols-3 gap-2 px-3 py-1.5 text-gray-700 ${i<numMisto-1?'border-b border-teal-50':''}`}>
                    <span>{i+1}/{numMisto}</span>
                    <span>{valParcMisto.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                    <span>{f.dataPrimeiraParcela ? fmtDate(addMonths(f.dataPrimeiraParcela,i)) : '—'}</span>
                  </div>
                ))}
                <div className="grid grid-cols-3 gap-2 px-3 py-1.5 bg-teal-50 font-bold text-teal-800 border-t border-teal-200">
                  <span>Total</span>
                  <span>{valTotal.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>
                  <span className="text-teal-600">{numMisto+1} lançamentos</span>
                </div>
              </div>
              <p className="text-xs text-teal-600 italic">Cada item será salvo como um lançamento individual.</p>
            </div>
          )}
        </div>
      )}
      <Field label="Observações"><Txta value={f.observacoes} onChange={ev=>set('observacoes')(ev.target.value)} placeholder="Anotações..." rows={2}/></Field>
      <MFooter onClose={onClose}/>
    </form>
  </ModalBox></Overlay>;
}

// ── VIEW FINANCEIRO ────────────────────────────────────────────────────────
function FinanceiroView({ honors, onSave, onDelete }) {
  const [modal, setModal] = useState(null);
  const [del, setDel] = useState(null);
  const [filtro, setFiltro] = useState('todos');
  const [busca, setBusca] = useState('');

  const fmtBRL = v => v?.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) || 'R$ 0,00';

  const totalCombinado = honors.reduce((s,h)=>s+(h.valorCombinado||0),0);
  const totalRecebido  = honors.reduce((s,h)=>s+(h.valorPago||0),0);
  const totalPendente  = honors.filter(h=>h.status!=='pago').reduce((s,h)=>s+((h.valorCombinado||0)-(h.valorPago||0)),0);
  const totalAtrasado  = honors.filter(h=>h.status==='atrasado').reduce((s,h)=>s+((h.valorCombinado||0)-(h.valorPago||0)),0);

  const filtered = honors.filter(h=>{
    if(filtro!=='todos'&&h.status!==filtro) return false;
    const q=busca.toLowerCase();
    return !q||[h.cliente,h.descricao,h.processo||'',h.tipo].some(s=>s.toLowerCase().includes(q));
  }).sort((a,b)=>(a.vencimento||'9999')>(b.vencimento||'9999')?1:-1);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="text-lg font-bold text-gray-800">💰 Financeiro</h2>
        <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm px-4 py-2 rounded-xl font-semibold hover:bg-indigo-700 transition">+ Lançamento</button>
      </div>

      <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
        {[{l:'Total combinado',v:totalCombinado,c:'text-gray-700',bg:'bg-white border-gray-200'},
          {l:'Recebido',v:totalRecebido,c:'text-green-700',bg:'bg-green-50 border-green-200'},
          {l:'A receber',v:totalPendente,c:'text-yellow-700',bg:'bg-yellow-50 border-yellow-200'},
          {l:'Atrasado',v:totalAtrasado,c:'text-red-700',bg:'bg-red-50 border-red-200'}].map(card=>(
          <div key={card.l} className={`rounded-xl border p-3 ${card.bg}`}>
            <p className="text-xs text-gray-500 font-medium">{card.l}</p>
            <p className={`text-lg font-black ${card.c}`}>{fmtBRL(card.v)}</p>
          </div>
        ))}
      </div>

      <div className="flex gap-2 flex-wrap">
        {['todos','pendente','pago','atrasado','parcial','parcelado','misto'].map(f=>(
          <button key={f} onClick={()=>setFiltro(f)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtro===f?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>
            {f==='todos'?'Todos':STATUS_HONOR[f]?.label}
          </button>
        ))}
      </div>
      <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar cliente, tipo..." value={busca} onChange={e=>setBusca(e.target.value)}/>

      {filtered.length===0?<div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">💰</p><p className="font-semibold">Nenhum lançamento encontrado</p></div>:
        <div className="space-y-3">
          {filtered.map(h=>{
            const st = STATUS_HONOR[h.status]||STATUS_HONOR.pendente;
            const isParc = h.status==='parcelado' && h.numParcelas > 0;
            const valorParcela = isParc ? (h.valorCombinado / h.numParcelas) : 0;
            const parcelasPagas = isParc ? (h.parcelasPagas || 0) : 0;
            const restante = (h.valorCombinado||0)-(h.valorPago||0);
            const pct = h.valorCombinado>0?Math.min(100,Math.round((h.valorPago/h.valorCombinado)*100)):0;
            const pctParc = isParc ? Math.min(100,Math.round((parcelasPagas/h.numParcelas)*100)) : pct;
            const vencido = h.vencimento&&parseDate(h.vencimento)<today()&&h.status!=='pago';
            return (
              <div key={h.id} className={`rounded-xl border-l-4 ${st.border} ${st.bg} p-4 shadow-sm`}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex-1">
                    <div className="flex items-center gap-1.5 flex-wrap mb-1">
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${st.badge}`}>{st.label}</span>
                      <span className="text-xs bg-white border border-gray-200 px-2 py-0.5 rounded-full text-gray-600">{h.tipo}</span>
                      {isParc&&<span className="text-xs bg-purple-100 border border-purple-300 text-purple-700 px-2 py-0.5 rounded-full font-semibold">📦 {parcelasPagas}/{h.numParcelas} parcelas</span>}
                      {vencido&&<span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">Vencido!</span>}
                    </div>
                    <p className="font-bold text-gray-800 text-sm">{h.cliente}</p>
                    <p className="text-xs text-gray-500">{h.descricao}</p>
                    {h.processo&&<p className="text-xs text-gray-400">Proc. {h.processo}</p>}
                    {isParc&&<p className="text-xs text-purple-600 font-medium">Parcela: {fmtBRL(valorParcela)}/mês</p>}
                  </div>
                  <div className="text-right shrink-0">
                    <p className="font-black text-gray-800 text-sm">{fmtBRL(h.valorCombinado)}</p>
                    {h.valorPago>0&&<p className="text-xs text-green-600">Recebido: {fmtBRL(h.valorPago)}</p>}
                    {restante>0&&h.status!=='pago'&&<p className="text-xs text-red-600">Falta: {fmtBRL(restante)}</p>}
                  </div>
                </div>
                {h.valorCombinado>0&&<div className="w-full bg-gray-200 rounded-full h-1.5 mb-2"><div className={`${isParc?'bg-purple-500':'bg-green-500'} h-1.5 rounded-full transition-all`} style={{width:pctParc+'%'}}/></div>}
                <div className="flex items-center justify-between">
                  {h.vencimento&&<p className="text-xs text-gray-400">📅 {isParc?'Próxima parcela:':'Vence:'} {fmtDate(h.vencimento)}</p>}
                  <div className="flex gap-1.5 ml-auto">
                    <button onClick={()=>setModal(h)} className="text-xs px-2.5 py-1 rounded-lg border border-indigo-300 text-indigo-600 hover:bg-indigo-50 font-medium transition">Editar</button>
                    <button onClick={()=>setDel(h.id)} className="text-xs px-2.5 py-1 rounded-lg border border-red-200 text-red-400 hover:bg-red-50 font-medium transition">Excluir</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>}
      {modal&&<HonorModal initial={modal==='new'?null:modal} onSave={h=>{(Array.isArray(h)?h:[h]).forEach(r=>onSave(r));setModal(null);}} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDelete(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>
  );
}

    return !q||[c.nome,c.cpfCnpj||'',c.telefone||'',c.email||''].some(s=>s.toLowerCase().includes(q));
  });

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="text-lg font-bold text-gray-800">👥 Clientes</h2>
        <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm px-4 py-2 rounded-xl font-semibold hover:bg-indigo-700 transition">+ Cliente</button>
      </div>

      <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/>

      {filteredCli.length===0?<div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">👤</p><p className="font-semibold">Nenhum cliente encontrado</p></div>:
        <div className="grid sm:grid-cols-2 gap-3">
          {filteredCli.map(c=>(
            <div key={c.id} className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm hover:shadow-md transition">
              <div className="flex items-start justify-between gap-2 mb-2">
                <div>
                  <p className="font-bold text-gray-800">{c.nome}</p>
                  {c.cpfCnpj&&<p className="text-xs text-gray-400">CPF/CNPJ: {c.cpfCnpj}</p>}
                </div>
                <div className="flex gap-1">
                  <button onClick={()=>setModal(c)} className="text-xs px-2 py-1 rounded-lg border border-indigo-300 text-indigo-600 hover:bg-indigo-50 transition">✏️</button>
                  <button onClick={()=>setDel(c.id)} className="text-xs px-2 py-1 rounded-lg border border-red-200 text-red-400 hover:bg-red-50 transition">🗑️</button>
                </div>
              </div>
              <div className="space-y-0.5">
                {c.telefone&&<p className="text-xs text-gray-600">📱 {c.telefone}</p>}
                {c.email&&<p className="text-xs text-gray-600">✉️ {c.email}</p>}
                {c.endereco&&<p className="text-xs text-gray-600">📍 {c.endereco}</p>}
              </div>
              {c.processos?.length>0&&<div className="mt-2 pt-2 border-t">
                <p className="text-xs text-gray-400 font-semibold mb-1">Processos:</p>
                {c.processos.map((p,i)=><p key={i} className="text-xs text-indigo-600 font-mono">{p}</p>)}
              </div>}
              {c.observacoes&&<p className="text-xs text-gray-500 mt-2 italic">{c.observacoes}</p>}
            </div>
          ))}
        </div>}
      {modal&&<ClienteModal initial={modal==='new'?null:modal} onSave={c=>{onSaveCliente(c);setModal(null);}} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDeleteCliente(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>
  );
}

const NOTIF_TIPOS = [
  {k:'mora',l:'Notificação de Mora / Inadimplemento'},
  {k:'cobranca',l:'Cobrança Extrajudicial'},
  {k:'rescisao',l:'Rescisão Contratual'},
  {k:'despejo',l:'Interpelação para Desocupação (Despejo)'},
  {k:'danos',l:'Notificação de Danos (Responsabilidade Civil)'},
  {k:'ultimato',l:'Ultimato Pré-Judicial'},
  {k:'arrependimento',l:'Exercício do Direito de Arrependimento (CDC)'},
  {k:'distrato',l:'Proposta de Distrato'},
  {k:'geral',l:'Notificação Extrajudicial Geral'},
];
function gerarNotif(tipo, f) {
  const nome = f.destinatario||'[DESTINATÁRIO]';
  const remetente = f.remetente||'[REMETENTE]';
  const valor = f.valor||'[VALOR]';
  const prazo = f.prazo||'[PRAZO]';
  const contrato = f.contrato||'[CONTRATO]';
  const dataHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const textos = {
    mora:`Vimos, por meio desta, NOTIFICAR V.Sa., ${nome}, CPF/CNPJ n.º [CPF/CNPJ], com endereço em [ENDEREÇO], da existência de débito no valor de R$ ${valor}, referente a ${contrato||'obrigação contratual'}, vencido e não pago até a presente data.\n\nIntimamos V.Sa. a efetuar o pagamento integral do valor em atraso, acrescido de juros de mora e correção monetária, no prazo improrrogável de ${prazo} dias contados do recebimento desta, sob pena de adoção das medidas judiciais cabíveis, incluindo protesto e ação de execução.\n\nSem mais para o momento, permanecemos à disposição.`,
    cobranca:`Vimos, por meio desta, efetuar a COBRANÇA AMIGÁVEL do débito de R$ ${valor} de titularidade de ${remetente}, referente a ${contrato||'serviços/produtos fornecidos'}, cujo vencimento se deu em [DATA VENCIMENTO].\n\nSolicitamos que V.Sa. efetue o pagamento no prazo de ${prazo} dias, a fim de evitar as medidas judiciais cabíveis e a inclusão do débito nos cadastros de proteção ao crédito.\n\nCaso já tenha efetuado o pagamento, pedimos a gentileza de desconsiderar esta notificação.`,
    rescisao:`Vimos, por meio desta, NOTIFICAR V.Sa., ${nome}, da rescisão do contrato celebrado entre as partes em [DATA DO CONTRATO], referente a ${contrato}, com fundamento em [CLÁUSULA/ARTIGO LEGAL], em razão de [MOTIVO DA RESCISÃO].\n\nA rescisão operará seus efeitos no prazo de ${prazo} dias contados do recebimento desta, devendo V.Sa. adimplir todas as obrigações pendentes até referida data.\n\nInformamos que eventuais pendências financeiras ou obrigações contratuais serão cobradas nas vias administrativa e judicial.`,
    despejo:`Vimos, por meio desta, INTERPELAR V.Sa., ${nome}, para que proceda à desocupação do imóvel situado em [ENDEREÇO DO IMÓVEL], atualmente ocupado a título de locação, no prazo de ${prazo} dias contados do recebimento desta notificação, com fundamento no art. [ARTIGO] da Lei n.º 8.245/1991.\n\nDecorrido o prazo sem a efetiva desocupação, ficará o(a) notificante autorizado(a) a ingressar com ação de despejo, sem prejuízo da cobrança dos aluguéis e encargos em atraso.`,
    danos:`Vimos, por meio desta, NOTIFICAR V.Sa., ${nome}, de que os fatos ocorridos em [DATA DO FATO], quais sejam [DESCRIÇÃO DO FATO], ocasionaram danos materiais e/ou morais ao(à) notificante no montante estimado de R$ ${valor}.\n\nRequeremos que V.Sa. apresente proposta de composição amigável no prazo de ${prazo} dias, sob pena de ajuizamento de ação de indenização por danos materiais e morais, acrescida de honorários e custas processuais.`,
    ultimato:`ÚLTIMO AVISO ANTES DA VIA JUDICIAL\n\nVimos, por meio desta, conceder a V.Sa., ${nome}, prazo FINAL e improrrogável de ${prazo} dias para regularização da seguinte situação: ${contrato||'[DESCRIÇÃO DA PENDÊNCIA]'}, no valor de R$ ${valor}.\n\nTranscorrido o prazo sem manifestação ou pagamento, tomaremos TODAS as medidas judiciais disponíveis, incluindo protesto, execução judicial e pedido de bloqueio de bens, arcando V.Sa. com as custas e honorários decorrentes.`,
    arrependimento:`Vimos, por meio desta, manifestar o EXERCÍCIO DO DIREITO DE ARREPENDIMENTO, nos termos do art. 49 do Código de Defesa do Consumidor (Lei n.º 8.078/1990), em razão da compra/contratação realizada em [DATA DA COMPRA] referente a ${contrato||'[PRODUTO/SERVIÇO]'}, no valor de R$ ${valor}.\n\nA contratação ocorreu fora do estabelecimento comercial, motivo pelo qual assiste ao consumidor o direito de desistência no prazo de 7 dias.\n\nRequeremos a imediata devolução do valor integral pago, no prazo de ${prazo} dias, sob pena de acionamento judicial com pedido de devolução em dobro (art. 42, CDC) e indenização por danos morais.`,
    distrato:`Vimos, por meio desta, propor o DISTRATO do contrato celebrado entre as partes em [DATA DO CONTRATO], referente a ${contrato}, com fundamento no art. 472 do Código Civil.\n\nPropomos os seguintes termos para a rescisão amigável:\n- Devolução de R$ ${valor} ao(à) notificante;\n- Prazo para devolução: ${prazo} dias;\n- Demais condições: [DESCREVER].\n\nSolicitamos manifestação de V.Sa. no prazo de ${prazo} dias. Caso não haja resposta, seremos obrigados a adotar as medidas judiciais cabíveis.`,
    geral:`Vimos, por meio desta NOTIFICAÇÃO EXTRAJUDICIAL, cientificar V.Sa., ${nome}, acerca de: ${contrato||'[DESCREVER O OBJETO DA NOTIFICAÇÃO]'}.\n\nRequeremos que V.Sa. tome as providências necessárias no prazo de ${prazo} dias contados do recebimento desta, sob pena de adoção das medidas legais cabíveis.\n\nFicamos no aguardo de manifestação.`,
  };
  return textos[tipo]||textos.geral;
}
function NotificacoesView() {
  const [tipo, setTipo] = useState('mora');
  const [f, setF] = useState({remetente:'',destinatario:'',valor:'',prazo:'5',contrato:''});
  const [texto, setTexto] = useState('');
  const [gerado, setGerado] = useState(false);
  const set = k => ev => setF(p=>({...p,[k]:ev.target.value}));
  function gerar() { setTexto(gerarNotif(tipo,f)); setGerado(true); }
  function imprimir() {
    const w = window.open('','_blank','width=800,height=600');
    if(!w) return;
    const dataHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Notificação Extrajudicial</title><style>body{font-family:Times New Roman,serif;max-width:700px;margin:40px auto;font-size:14px;line-height:1.8;color:#000}h2{text-align:center;text-transform:uppercase;font-size:16px;margin-bottom:30px}p{margin:10px 0;text-align:justify}.ass{margin-top:60px;text-align:center}.linha{border-top:1px solid #000;width:300px;margin:0 auto}</style></head><body><h2>Notificação Extrajudicial</h2><p><strong>São Paulo, ${dataHoje}</strong></p><p><strong>A(o) Senhor(a) ${f.destinatario||'[DESTINATÁRIO]'}</strong></p><br><p>${texto.replace(/\n/g,'</p><p>')}</p><div class="ass"><p>Atenciosamente,</p><div class="linha"></div><p><strong>${f.remetente||'[REMETENTE]'}</strong></p></div></body></html>`);
    w.document.close();
    w.print();
  }
  return (
    <div className="space-y-4">
      <h2 className="font-bold text-gray-700 text-lg">📄 Notificações Extrajudiciais</h2>
      <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm space-y-3">
        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Tipo de Notificação</p>
        <div className="grid grid-cols-1 gap-1.5">
          {NOTIF_TIPOS.map(t=>(
            <button key={t.k} onClick={()=>{setTipo(t.k);setGerado(false);}} className={`text-left text-xs px-3 py-2 rounded-lg border font-medium transition ${tipo===t.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-700 border-gray-300 hover:bg-indigo-50'}`}>{t.l}</button>
          ))}
        </div>
      </div>
      <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm space-y-3">
        <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Dados para Preenchimento</p>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Remetente (você / cliente)"><Inp value={f.remetente} onChange={set('remetente')} placeholder="Nome do remetente"/></Field>
          <Field label="Destinatário (notificado)"><Inp value={f.destinatario} onChange={set('destinatario')} placeholder="Nome do notificado"/></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Valor (R$)"><Inp value={f.valor} onChange={set('valor')} placeholder="Ex: 5.000,00"/></Field>
          <Field label="Prazo (dias)"><Inp value={f.prazo} onChange={set('prazo')} placeholder="Ex: 5"/></Field>
        </div>
        <Field label="Contrato / Objeto / Descrição"><Inp value={f.contrato} onChange={set('contrato')} placeholder="Ex: contrato de prestação de serviços nº 001/2025"/></Field>
        <button onClick={gerar} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-xl text-sm transition">⚡ Gerar Notificação</button>
      </div>
      {gerado&&texto&&(
        <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm space-y-3">
          <div className="flex items-center justify-between">
            <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Texto Gerado</p>
            <button onClick={imprimir} className="text-xs px-3 py-1.5 rounded-lg bg-green-600 hover:bg-green-700 text-white font-semibold transition">🖨️ Imprimir / PDF</button>
          </div>
          <textarea value={texto} onChange={e=>setTexto(e.target.value)} rows={12}
            className="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 font-serif leading-relaxed"/>
          <p className="text-xs text-gray-400 italic">Edite o texto acima antes de imprimir. Substitua os campos em [COLCHETES] pelos dados reais.</p>
        </div>
      )}
    </div>
  );
}

          <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
            {HABILIDADES_CLAUDE.map(h=>(
              <div key={h.titulo} className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm hover:shadow-md transition">
                <div className="flex items-start gap-3">
                  <span className="text-xl shrink-0">{h.icon}</span>

// ── HELPERS LOCALSTORAGE ────────────────────────────────────────────────────
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// ── APP PRINCIPAL ──────────────────────────────────────────────────────────
function App() {
  const [prazos, setPrazos] = useState(() => lsGet('ebr_prazos', PRAZOS_INIT));
  const [comps, setComps] = useState(() => lsGet('ebr_comps', COMP_INIT));
  const [pubs, setPubs] = useState(() => {
    const filePubs = [...PUBS_INIT, ...PUBS_AASP];
    const stored = lsGet('ebr_pubs', null);
    if (!stored) return filePubs;
    // Sempre compara: insere qualquer publicação do arquivo que ainda não está no localStorage
    const storedIds = new Set(stored.map(p => p.id));
    const novos = filePubs.filter(p => !storedIds.has(p.id));
    return novos.length > 0 ? [...novos, ...stored] : stored;
  });
  const [pends, setPends] = useState(() => {
    const stored = lsGet('ebr_pends', null);
    if (!stored) return [...PEND_INIT, ...PEND_OUTLOOK, ...PEND_WHATSAPP];
    // Merge automático: inclui novas mensagens WA e Outlook quando o sync muda
    let result = stored;
    if (WHATSAPP_LAST_SYNC && WHATSAPP_LAST_SYNC !== lsGet('ebr_wa_sync','') && PEND_WHATSAPP.length > 0) {
      const ids = new Set(stored.map(p=>p.id));
      const novos = PEND_WHATSAPP.filter(p=>!ids.has(p.id));
      if (novos.length > 0) result = [...novos, ...result];
    }
    if (OUTLOOK_LAST_SYNC && OUTLOOK_LAST_SYNC !== lsGet('ebr_outlook_sync','') && PEND_OUTLOOK.length > 0) {
      const ids = new Set(result.map(p=>p.id));
      const novos = PEND_OUTLOOK.filter(p=>!ids.has(p.id));
      if (novos.length > 0) result = [...novos, ...result];
    }
    return result;
  });
  const [inics, setInics] = useState(() => lsGet('ebr_inics', INIC_INIT));
  const [honors, setHonors] = useState(() => lsGet('ebr_honors', HONOR_INIT));
  const [clientes, setClientes] = useState(() => lsGet('ebr_clientes', CLIENTES_INIT));
  const [procus, setProcu] = useState(() => lsGet('ebr_procus', PROCU_INIT));
  const [tab, setTab] = useState('dashboard');
  const [newCompInitial, setNewCompInitial] = useState(null);
  const [fazSync] = useState(FAZ_LAST_SYNC || null);
  const [aaspSync] = useState(AASP_LAST_SYNC || null);

  // Salvar automaticamente no navegador sempre que os dados mudam
  React.useEffect(() => { lsSet('ebr_prazos', prazos); }, [prazos]);

  // Limpeza automática: remove prazos cumpridos há mais de 10 dias
  React.useEffect(() => {
    const limite = new Date(); limite.setDate(limite.getDate() - 10);
    const limiteStr = isoDate(limite);
    setPrazos(p => {
      const filtrados = p.filter(x => {
        if (!x.cumprido) return true;
        if (!x.dataCumprimento) return true;
        return x.dataCumprimento > limiteStr;
      });
      return filtrados.length !== p.length ? filtrados : p;
    });
  }, []);
  React.useEffect(() => {
    if (WHATSAPP_LAST_SYNC) lsSet('ebr_wa_sync', WHATSAPP_LAST_SYNC);
    if (OUTLOOK_LAST_SYNC) lsSet('ebr_outlook_sync', OUTLOOK_LAST_SYNC);
  }, []);
  React.useEffect(() => { lsSet('ebr_comps', comps); }, [comps]);
  React.useEffect(() => { lsSet('ebr_pubs', pubs); }, [pubs]);
  React.useEffect(() => { lsSet('ebr_pends', pends); }, [pends]);

  // Limpeza automática: remove pendências concluídas há mais de 10 dias
  React.useEffect(() => {
    const limite = new Date(); limite.setDate(limite.getDate() - 10);
    const limiteStr = isoDate(limite);
    setPends(p => {
      const filtradas = p.filter(x => {
        if (x.status !== 'concluido') return true;
        if (!x.dataConclusao) return true; // sem data, mantém
        return x.dataConclusao > limiteStr;  // mantém se conclusão < 10 dias
      });
      return filtradas.length !== p.length ? filtradas : p; // só atualiza se removeu algo
    });
  }, []);

  React.useEffect(() => { lsSet('ebr_inics', inics); }, [inics]);
  React.useEffect(() => { lsSet('ebr_honors', honors); }, [honors]);
  React.useEffect(() => { lsSet('ebr_clientes', clientes); }, [clientes]);
  React.useEffect(() => { lsSet('ebr_procus', procus); }, [procus]);

  // PRAZOS
  const savePrazo = useCallback(p=>setPrazos(prev=>prev.find(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[p,...prev]),[]);
  const deletePrazo = useCallback(id=>setPrazos(p=>p.filter(x=>x.id!==id)),[]);
  const togglePrazo = useCallback(id=>setPrazos(p=>p.map(x=>x.id===id
    ? x.cumprido
      ? {...x, cumprido:false, dataCumprimento:null}
      : {...x, cumprido:true, dataCumprimento:isoDate(new Date())}
    : x
  )),[]);

  // COMPROMISSOS
  const saveComp = useCallback(c=>{ setComps(prev=>prev.find(x=>x.id===c.id)?prev.map(x=>x.id===c.id?c:x):[c,...prev]); },[]);
  const deleteComp = useCallback(id=>setComps(c=>c.filter(x=>x.id!==id)),[]);
  const toggleComp = useCallback(id=>setComps(c=>c.map(x=>x.id===id?{...x,concluido:!x.concluido}:x)),[]);

  // PUBLICAÇÕES
  const marcarLida = useCallback(id=>setPubs(p=>p.map(x=>x.id===id?{...x,status:'lida'}:x)),[]);
  const refreshPubs = useCallback((novasPubs)=>{
    // Se recebeu array direto (do servidor JSON), usa; senão re-lê PUBS_INIT/PUBS_AASP do arquivo
    const fonte = (Array.isArray(novasPubs) && novasPubs.length > 0) ? novasPubs : [...PUBS_INIT, ...PUBS_AASP];
    setPubs(prev=>{
      const storedIds = new Set(prev.map(p=>p.id));
      const novos = fonte.filter(p=>!storedIds.has(p.id));
      return novos.length > 0 ? [...novos, ...prev] : prev;
    });
  },[]);

  const tratarPublicacao = useCallback((pub, prazoInfo) => {
    const hoje = isoDate(new Date());
    if (prazoInfo && prazoInfo.data && prazoInfo.tipo) {
      const novoPrazoId = Date.now();
      const parte = (pub.partes||'').split(' x ')[0].split('/')[0].trim().slice(0,60);
      const novoPrazo = {
        id: novoPrazoId,
        processo: pub.processo,
        tipo: prazoInfo.tipo,
        parte,
        tribunal: pub.orgao?.includes('TRT')||pub.orgao?.includes('Trabalho') ? 'TRT' : 'TJSP',
        vara: pub.orgao||'',
        data: prazoInfo.data,
        observacoes: `Originado da publicação de ${fmtDate(pub.dataPublicacao)}.\n${prazoInfo.obs||''}`,
        cumprido: false,
      };
      setPrazos(p=>[...p, novoPrazo]);
      setPubs(p=>p.map(x=>x.id===pub.id?{...x,status:'tratada',dataTratamento:hoje,prazoVinculado:novoPrazoId}:x));
    } else {
      setPubs(p=>p.map(x=>x.id===pub.id?{...x,status:'tratada',dataTratamento:hoje}:x));
    }
  },[]);

  // De prazo para agenda
  const addCompFromPrazo = useCallback(()=>{},[]);

  // De publicação → criar prazo
  const criarPrazoFromPub = useCallback(pub=>{
    const novoPrazo = { processo:pub.processo, tipo:'Manifestação', parte:pub.partes.split(' x ')[0].split('/')[0].trim(), tribunal:'TJSP', vara:pub.orgao, data:'', observacoes:pub.conteudo.slice(0,200), cumprido:false };
    savePrazo({...novoPrazo, id:Date.now()});
    setPubs(p=>p.map(x=>x.id===pub.id?{...x,prazoVinculado:Date.now(),status:'tratada'}:x));
    setTab('prazos');
  },[savePrazo]);

  // De publicação → agenda
  const addAgendaFromPub = useCallback(pub=>{
    setPubs(p=>p.map(x=>x.id===pub.id?{...x,status:'lida'}:x));
  },[]);

  // PENDÊNCIAS
  const savePend = useCallback(p=>setPends(prev=>prev.find(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[p,...prev]),[]);
  const deletePend = useCallback(id=>setPends(p=>p.filter(x=>x.id!==id)),[]);
  const togglePend = useCallback(id=>setPends(p=>p.map(x=>x.id===id
    ? x.status==='concluido'
      ? {...x, status:'pendente', dataConclusao:null}
      : {...x, status:'concluido', dataConclusao:isoDate(new Date())}
    : x
  )),[]);

  // INICIAIS
  const saveInic = useCallback(i=>setInics(prev=>prev.find(x=>x.id===i.id)?prev.map(x=>x.id===i.id?i:x):[i,...prev]),[]);
  const deleteInic = useCallback(id=>setInics(i=>i.filter(x=>x.id!==id)),[]);
  const changeStatusInic = useCallback((id,status)=>setInics(i=>i.map(x=>x.id===id?{...x,status}:x)),[]);

  // FINANCEIRO
  const saveHonor = useCallback(h=>setHonors(prev=>prev.find(x=>x.id===h.id)?prev.map(x=>x.id===h.id?h:x):[h,...prev]),[]);
  const deleteHonor = useCallback(id=>setHonors(h=>h.filter(x=>x.id!==id)),[]);

  // CLIENTES
  const saveCliente = useCallback(c=>setClientes(prev=>prev.find(x=>x.id===c.id)?prev.map(x=>x.id===c.id?c:x):[c,...prev]),[]);
  const deleteCliente = useCallback(id=>setClientes(c=>c.filter(x=>x.id!==id)),[]);

  // PROCURAÇÕES
  const saveProcu = useCallback(p=>setProcu(prev=>prev.find(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[p,...prev]),[]);
  const deleteProcu = useCallback(id=>setProcu(p=>p.filter(x=>x.id!==id)),[]);

  const pubNaoLidas = pubs.filter(p=>p.status==='nao_lida').length;
  const pendAtivas = pends.filter(p=>p.status==='pendente').length;
  const inicsAtivas = inics.filter(i=>i.status!=='distribuida').length;
  const honorAtrasados = honors.filter(h=>h.status==='atrasado').length;
  const procuAlertas = procus.filter(p=>getProcuStatus(p.dataValidade)!=='ativa').length;
  const waNaoLidas = pends.filter(p=>p.status==='pendente'&&p.origem==='whatsapp').length;

  const TABS = [
    {k:'dashboard',   icon:'🏠', l:'Dashboard'},
    {k:'publicacoes', icon:'📰', l:'Publicações',  badge: pubNaoLidas},
    {k:'prazos',      icon:'⚖️', l:'Prazos'},
    {k:'agenda',      icon:'📅', l:'Agenda'},
    {k:'pendencias',  icon:'👤', l:'Pendências',   badge: pendAtivas},
    {k:'iniciais',    icon:'📄', l:'Iniciais',     badge: inicsAtivas},
    {k:'financeiro',  icon:'💰', l:'Financeiro',   badge: honorAtrasados},
    {k:'clientes',    icon:'👥', l:'Clientes',     badge: procuAlertas},
    {k:'email',       icon:'📧', l:'E-mail'},
    {k:'whatsapp',    icon:'💬', l:'WhatsApp',     badge: waNaoLidas},
    {k:'central',     icon:'⚖️', l:'Central Jurídica'},
  ];

  const prazoAlerts = useMemo(()=>{ const c={vencido:0,urgente:0}; prazos.forEach(p=>{const s=getPrazoStatus(p.data,p.cumprido); if(s==='vencido')c.vencido++; if(s==='urgente')c.urgente++;}); return c;},[prazos]);
  return (
    <div className="min-h-screen bg-gray-100">
      <div className="bg-indigo-700 text-white px-4 pt-4 pb-0 shadow-lg">
        <div className="max-w-7xl mx-auto">
          <div className="flex items-center justify-between mb-3">
            <div>
              <h1 className="text-lg font-bold tracking-tight">⚖️ Elaine Brandão Rodrigues</h1>
              <p className="text-indigo-300 text-xs">OAB SP-292738 — Gestão de Prazos <span className="text-indigo-400 text-xs">v18/03h</span></p>
            </div>
            <div className="flex items-center gap-1.5 flex-wrap justify-end">
              {prazoAlerts.vencido>0&&<span className="text-xs font-bold bg-red-500 text-white px-2 py-0.5 rounded-full">{prazoAlerts.vencido} prazo{prazoAlerts.vencido>1?'s':''} vencido{prazoAlerts.vencido>1?'s':''}</span>}
              {prazoAlerts.urgente>0&&<span className="text-xs font-bold bg-violet-500 text-white px-2 py-0.5 rounded-full">{prazoAlerts.urgente} urgente{prazoAlerts.urgente>1?'s':''}</span>}
              {honorAtrasados>0&&<span className="text-xs font-bold bg-yellow-500 text-white px-2 py-0.5 rounded-full">💰 {honorAtrasados} atrasado{honorAtrasados>1?'s':''}</span>}
              {procuAlertas>0&&<span className="text-xs font-bold bg-purple-500 text-white px-2 py-0.5 rounded-full">📜 {procuAlertas} procuração</span>}
            </div>
          </div>
          <div className="flex gap-1 overflow-x-auto">
            {TABS.map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)}
                className={`nav-tab shrink-0 px-3 py-2 text-xs font-semibold rounded-t-lg border-b-2 transition flex items-center gap-1 ${tab===t.k?'bg-white text-indigo-700 border-white':'text-indigo-200 border-transparent hover:text-white hover:border-indigo-400'}`}>
                {t.icon} {t.l}
                {t.badge>0&&<span className="bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold ml-0.5">{t.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div className="max-w-7xl mx-auto px-4 py-5">
        {tab==='dashboard'&&<Dashboard prazos={prazos} compromissos={comps} pubs={pubs} pends={pends} inics={inics} honors={honors} procus={procus} onGoTo={setTab}/>}
        {tab==='publicacoes'&&<PublicacoesView pubs={pubs} prazos={prazos} onMarcarLida={marcarLida} onTratar={tratarPublicacao} onCriarPrazo={criarPrazoFromPub} onAddAgenda={addAgendaFromPub} fazSync={fazSync} aaspSync={aaspSync} onRefreshPubs={refreshPubs}/>}
        {tab==='prazos'&&<PrazosView prazos={prazos} onSave={savePrazo} onDelete={deletePrazo} onToggle={togglePrazo} onAddComp={addCompFromPrazo}/>}
        {tab==='agenda'&&<AgendaView prazos={prazos} compromissos={comps} onNewComp={()=>{}}/>}
        {tab==='pendencias'&&<PendenciasView pends={pends} onSave={savePend} onDelete={deletePend} onToggle={togglePend}/>}
        {tab==='iniciais'&&<IniciaisView inics={inics} onSave={saveInic} onDelete={deleteInic} onChangeStatus={changeStatusInic} clientes={clientes} onSaveCliente={saveCliente}/>}
        {tab==='financeiro'&&<FinanceiroView honors={honors} onSave={saveHonor} onDelete={deleteHonor}/>}
        {tab==='clientes'&&<ClientesView clientes={clientes} procus={procus} onSaveCliente={saveCliente} onDeleteCliente={deleteCliente} onSaveProcu={saveProcu} onDeleteProcu={deleteProcu}/>}
        {tab==='email'&&<EmailView pends={pends} clientes={clientes}/>}
        {tab==='whatsapp'&&<WhatsAppView pends={pends} clientes={clientes} onSave={savePend} onDelete={deletePend}/>}
        {tab==='central'&&<CentralJuridicaView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  // ========== INTEGRAÇÃO GOOGLE SHEETS ==========
  // Função para salvar cliente no Google Sheets quando disponível
  window.salvarClienteNoGoogleSheets = function(cliente) {
      // Verificar se google.script.run está disponível (rodando dentro do Google Apps Script)
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                                                      // Preparar objeto do cliente com os campos esperados pelo Código.gs
                  const clienteData = {
                          nome: cliente.nome || '',
                          email: cliente.email || '',
                          telefone: cliente.telefone || '',
                          cnpj_cpf: cliente.cnpj_cpf || cliente.cpf || '',
                          endereco: cliente.endereco || '',
                          status: cliente.status || 'Ativo'
                  };

                  // Chamar função do Google Apps Script para salvar
                  google.script.run
                    .withSuccessHandler(function(result) {
                              console.log('✅ Cliente salvo no Google Sheets:', result);
                              // Mostrar notificação ao usuário
                              if (window.showNotification) {
                                          window.showNotification('Cliente salvo com sucesso no Google Sheets', 'success');
                              }
                    })
                    .withFailureHandler(function(error) {
                              console.error('❌ Erro ao salvar no Google Sheets:', error);
                              // Mostrar notificação de erro
                              if (window.showNotification) {
                                          window.showNotification('Erro ao salvar no Google Sheets: ' + error, 'error');
                              }
                    })
                    .salvarCliente(clienteData);
            } else {
                  // Se não estiver dentro do Google Apps Script, salvar apenas localmente
                  console.log('ℹ️ Google Apps Script não disponível. Salvando localmente.');
                  localStorage.setItem('cliente_' + (cliente.id || Date.now()), JSON.stringify(cliente));
            }
  };

  // Interceptar o comando global para salvar (se houver)
  window.addEventListener('salvarCliente', function(event) {
      if (event.detail && event.detail.cliente) {
            window.salvarClienteNoGoogleSheets(event.detail.cliente);
      }
  });
  // ================================================
</script>
