<script>
(function () {
  'use strict';
  const STORAGE_KEY = 'faz_sync_bridge';
  const CHECKED_KEY = 'faz_sync_last_check';

  window.__fazSync = function (pubsJSON) {
    try {
      const pubs = typeof pubsJSON === 'string' ? JSON.parse(pubsJSON) : pubsJSON;
      if (!Array.isArray(pubs)) return;
      importarPubs(pubs);
    } catch (e) { console.error('[FAZ Bridge] Erro:', e); }
  };

  function verificarBridge() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const lastCheck = localStorage.getItem(CHECKED_KEY) || '0';
      const payload = JSON.parse(raw);
      if (!payload.timestamp || payload.timestamp <= parseInt(lastCheck)) return;
      localStorage.setItem(CHECKED_KEY, String(payload.timestamp));
      if (Array.isArray(payload.pubs) && payload.pubs.length > 0) importarPubs(payload.pubs);
    } catch (e) {}
  }

  function importarPubs(pubs) {
    try {
      const stored = JSON.parse(localStorage.getItem('ebr_pubs') || '[]');
      const ids = new Set(stored.map(p => p.id));
      const novas = pubs.filter(p => p.id && !ids.has(p.id));
      if (novas.length === 0) return;
      localStorage.setItem('ebr_pubs', JSON.stringify([...novas, ...stored]));
      const d = document.createElement('div');
      d.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:99999;background:#1e293b;border:1px solid #22c55e;color:#22c55e;padding:12px 20px;border-radius:12px;font-family:system-ui,sans-serif;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.4)';
      d.textContent = '⚖️ ' + novas.length + ' publicação(ões) do FAZ importada(s)!';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 6000);
      setTimeout(() => { if (confirm(novas.length + ' publicação(ões) do FAZ importadas. Recarregar para ver?')) location.reload(); }, 700);
    } catch (e) {}
  }

  setInterval(verificarBridge, 5000);
  verificarBridge();
  console.log('[FAZ Bridge] Ativo.');
})();
</script>

function calcPrescricao(inic) {
  const p = PRESCRICAO_MAP[inic.tipoAcao];
  if (!inic.dataDFato || !p) return null;
  if (p.imp) return { imprescritivel:true, label:p.label, base:p.base||'', obs:p.obs||'' };
  const inicio = parseDate(inic.dataDFato);
  if (!inicio) return null;
  const deadline = new Date(inicio);
  if (p.anos) deadline.setFullYear(deadline.getFullYear()+p.anos);
  else if (p.meses) deadline.setMonth(deadline.getMonth()+p.meses);
  else if (p.dias) deadline.setDate(deadline.getDate()+p.dias);
  const diffDias = Math.ceil((deadline - today()) / 86400000);

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
function fmtDate(s) { const d = parseDate(s); return d ? d.toLocaleDateString('pt-BR') : '—'; }
function isoDate(d) { return d.toISOString().slice(0,10); }

function getPrazoStatus(data, cumprido) {
  if (cumprido) return 'cumprido';
  const d = parseDate(data); if (!d) return 'ok';
  const diff = Math.ceil((d - today()) / 86400000);
  if (diff < 0) return 'vencido';
  if (diff <= 3) return 'urgente';
  if (diff <= 7) return 'proximo';
  return 'ok';
}
function diffLabel(data, cumprido) {
  if (cumprido) return 'Cumprido';
  const d = parseDate(data); if (!d) return '';
  const diff = Math.ceil((d - today()) / 86400000);
  if (diff < 0) return `Venceu há ${Math.abs(diff)} dia${Math.abs(diff)>1?'s':''}`;
  if (diff === 0) return 'Vence HOJE!';
  if (diff === 1) return 'Vence amanhã';
  return `${diff} dias restantes`;
}

// ── MOTOR DE ANÁLISE JURÍDICA ─────────────────────────────────────────────
function analisarPublicacao(pub) {
  const txt = ((pub.conteudo||'') + ' ' + (pub.tipo||'') + ' ' + (pub.classe||'')).toLowerCase();
  const orgao = (pub.orgao||'').toLowerCase();
  const diario = (pub.diario||'').toLowerCase();
  const isTrab = orgao.includes('trabalho')||orgao.includes('trt')||diario.includes('trt')||txt.includes('reclamante')||txt.includes('reclamado')||txt.includes('trabalhista');
  const baseDt = pub.dataDisponibilizacao || pub.dataPublicacao || isoDate(new Date());

  function addUteis(n) {
    let d = new Date(baseDt + 'T12:00:00'); let c = 0;
    while (c < n) { d.setDate(d.getDate()+1); if(d.getDay()!==0&&d.getDay()!==6) c++; }
    return isoDate(d);
  }
  function addCorridos(n) {
    let d = new Date(baseDt + 'T12:00:00'); d.setDate(d.getDate()+n); return isoDate(d);
  }
  function extractDias(fallback=15) {
    const m = txt.match(/prazo\s+de\s+(\d+)\s*\(?\w*\)?\s*dias/i) || txt.match(/(\d+)\s*\(quinze|trinta|dez|cinco|oito\)\s*dias/i);
    return m ? parseInt(m[1]) : fallback;
  }

  // 1. Recurso Especial inadmitido → AREsp
  if ((txt.includes('inadmit')&&(txt.includes('recurso especial')||txt.includes('resp')))||txt.includes('aresp')) {
    return { peca:'Agravo em Recurso Especial (AREsp)', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 1.042 – 15 dias úteis para AREsp contra decisão de inadmissão do REsp', urgencia:'alta', obs:'⚠️ Embargos de Declaração contra esta decisão NÃO interrompem o prazo para o AREsp.' };
  }
  // 2. Embargos de Declaração rejeitados → Recurso ao STJ/STF
  if (txt.includes('embargos')&&(txt.includes('rejeitad')||txt.includes('rejeito')||txt.includes('rejeitar'))) {
    return { peca:'Recurso Especial (REsp) ou Recurso Extraordinário (RE)', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 1.003 §5º – 15 dias úteis para REsp/RE após rejeição dos EDcl', urgencia:'alta', obs:'Verificar preparo: STJ R$ 259,08 / STF R$ 1.157,59 + porte R$ 110,90 (CPC art. 1.007).' };
  }
  // 3. Apelação provida / sentença / acórdão genérico
  if (txt.includes('deram provimento')||txt.includes('apelação provida')||(txt.includes('apelação')&&txt.includes('provid'))) {
    return { peca:'Análise do acórdão / Embargos de Declaração ou REsp', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 1.003 §5º – 15 dias úteis para recurso após publicação do acórdão', urgencia:'alta', obs:'Apelação provida: verificar se há vício de obscuridade/omissão para EDcl ou se cabe REsp/RE.' };
  }
  // 4. Intimação de Acórdão genérico
  if (txt.includes('intimação de acórdão')||txt.includes('acórdão')) {
    return { peca:'Embargos de Declaração / REsp / RE', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 1.003 §5º – 15 dias úteis; EDcl 5 dias úteis (art. 1.023)', urgencia:'alta', obs:'Analisar o dispositivo do acórdão para identificar o recurso cabível.' };
  }
  // 5. Sentença
  if (txt.includes('sentença')&&!txt.includes('cumprimento')&&(txt.includes('procedente')||txt.includes('improcedente')||txt.includes('extinto')||txt.includes('homologo'))) {
    if (isTrab) return { peca:'Recurso Ordinário (RO)', prazo:addCorridos(8), dias:8, tipo:'dias corridos', base:'CLT art. 895 – 8 dias corridos para Recurso Ordinário trabalhista', urgencia:'alta', obs:'Prazo conta em dias corridos (CLT art. 775). Verificar depósito recursal e FGTS.' };
    return { peca:'Apelação', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC arts. 1.009 e 1.003 §5º – 15 dias úteis para Apelação', urgencia:'alta', obs:'Verificar valor do preparo (2% sobre o valor da condenação – CPC art. 1.007).' };
  }
  // 6. Cumprimento de sentença
  if (txt.includes('cumprimento de sentença')||txt.includes('cumprimento de sentenca')) {
    return { peca:'Impugnação ao Cumprimento de Sentença', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 525 – 15 dias úteis para impugnar após intimação do executado', urgencia:'alta', obs:'A impugnação não tem efeito suspensivo automático (art. 525 §6º). Analisar pedido de suspensão.' };
  }
  // 7. Execução / penhora
  if (txt.includes('execução')||txt.includes('penhora')||txt.includes('citado para pagar')) {
    return { peca:'Embargos à Execução / Exceção de Pré-Executividade', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 915 – 15 dias úteis para Embargos à Execução após citação', urgencia:'alta', obs:'Verificar garantia do juízo para oposição de embargos.' };
  }
  // 8. Citação para contestar
  if (txt.includes('cite-se')||txt.includes('citad')||txt.includes('para contestar')||txt.includes('réu seja citado')) {
    if (isTrab) return { peca:'Contestação', prazo:addCorridos(5), dias:5, tipo:'dias corridos', base:'CLT art. 841 – 5 dias corridos para resposta à reclamação trabalhista', urgencia:'alta', obs:'Prazo trabalhista em dias corridos. Verificar documentos a juntar e pedido de gratuidade.' };
    return { peca:'Contestação', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 335 – 15 dias úteis para Contestação a contar da citação', urgencia:'alta', obs:'Prazo conta da data da efetiva citação, não da publicação. Verificar reconvenção (art. 343).' };
  }
  // 9. Prazo fatal imposto pelo juízo
  if (txt.includes('prazo derradeiro')||txt.includes('pena de extinção')||txt.includes('pena de indeferimento')||txt.includes('sob pena de arquivamento')) {
    const d = extractDias(15);
    return { peca:'Petição de Cumprimento / Manifestação', prazo:addUteis(d), dias:d, tipo:'dias úteis', base:`Prazo judicial de ${d} dias. Descumprimento implica extinção ou arquivamento (art. 321 CPC).`, urgencia:'alta', obs:'🚨 PRAZO FATAL. Providenciar documentos ou recolher custas imediatamente.' };
  }
  // 10. Resposta à acusação / criminal
  if (txt.includes('resposta à acusação')||txt.includes('denúncia recebida')||txt.includes('receber a denúncia')) {
    return { peca:'Resposta à Acusação', prazo:addUteis(10), dias:10, tipo:'dias úteis', base:'CPP art. 396-A – 10 dias úteis para apresentação de Resposta à Acusação', urgencia:'alta', obs:'Apresentar defesa preliminar, indicar provas e testemunhas (máx. 8 – CPP art. 401).' };
  }
  // 11. Agravo de instrumento
  if (txt.includes('decisão')&&(txt.includes('agrave')||txt.includes('recorrer'))) {
    return { peca:'Agravo de Instrumento', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 1.003 §5º c/c art. 1.015 – 15 dias úteis para AI', urgencia:'alta', obs:'Verificar hipóteses de cabimento (CPC art. 1.015, rol taxativo).' };
  }
  // 12. Audiência / perícia designada
  if (txt.includes('audiência')||txt.includes('audiencia')||txt.includes('atendimento pericial')||txt.includes('perícia')) {
    const dtM = (pub.conteudo||'').match(/(\d{2})\/(\d{2})\/(\d{4})/);
    const dtEv = dtM ? `${dtM[3]}-${dtM[2]}-${dtM[1]}` : addUteis(5);
    return { peca:'Preparação para Audiência / Perícia', prazo:dtEv, dias:null, tipo:'data do evento', base:'Ato processual com data designada. Presença obrigatória da parte e do advogado.', urgencia:'media', obs:'Comunicar o cliente com antecedência. Preparar quesitos, documentos e testemunhas.' };
  }
  // 13. Sobrestamento / suspensão
  if (txt.includes('sobrestamento')||txt.includes('sobrestado')||txt.includes('suspenso')) {
    return { peca:'Petição de Acompanhamento Mensal', prazo:addCorridos(30), dias:30, tipo:'dias corridos', base:'Determinação judicial de informar mensalmente o andamento do feito correlato.', urgencia:'baixa', obs:'Criar lembrete mensal para informar o juízo sobre o andamento do processo vinculado.' };
  }
  // 14. Inquérito / citação edital
  if (txt.includes('edital')||txt.includes('citação por edital')) {
    return { peca:'Habilitação de Crédito / Manifestação', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'Verificar prazo específico no edital. Lei 11.101/2005 (falências) ou CPC.', urgencia:'baixa', obs:'Verificar o prazo e as condições estabelecidos no edital publicado.' };
  }
  // 15. Intimação genérica / manifeste-se
  return { peca:'Petição de Manifestação / Ciência', prazo:addUteis(15), dias:15, tipo:'dias úteis', base:'CPC art. 218 §3º – Prazo geral de 15 dias úteis para manifestação', urgencia:'media', obs:'Analisar o teor da decisão para confirmar o ato processual adequado e prazo aplicável.' };
}

// ── MODAL: TRATAR PUBLICAÇÃO ──────────────────────────────────────────────
const OPENAI_KEY_LS = 'ebr_openai_key';

async function analisarComOpenAI(pub) {
  const key = localStorage.getItem(OPENAI_KEY_LS);
  if (!key) return null;
  const hoje = new Date().toLocaleDateString('pt-BR');
  const prompt = `Você é um assistente jurídico processual brasileiro. Analise a publicação abaixo e retorne SOMENTE um objeto JSON válido com exatamente estes campos:

{
  "triagem": "resumo da urgência em 1 linha (ex: 🚨 PRAZO FATAL — Apelação em 15 dias úteis | Data-limite: DD/MM/AAAA)",
  "o_que_aconteceu": "resumo narrativo do que ocorreu processualmente (2-4 linhas)",
  "natureza_do_ato": "classificação jurídica do ato (sentença, despacho, decisão interlocutória, etc.)",
  "o_que_foi_determinado": "lista dos comandos judiciais expressos, um por linha iniciando com -",
  "medida_cabivel": "medida jurídica principal cabível com fundamento legal (ex: Apelação — CPC art. 1.009)",
  "peca": "nome exato e conciso da peça a elaborar",
  "prazo": "data-limite em YYYY-MM-DD, calculada contando dias úteis conforme CPC a partir da disponibilização",
  "prazo_descricao": "explicação do cálculo: base legal, quantidade de dias, marco inicial, data-limite por extenso",
  "base_legal": "artigos legais aplicáveis (ex: CPC art. 1.009 c/c art. 1.003 §5º)",
  "urgencia": "baixa | media | alta | altissima",
  "riscos_da_inercia": ["risco 1", "risco 2", "risco 3"],
  "checklist": ["providência ou documento 1", "providência 2", "providência 3"]
}

Dados da publicação:
- Tipo: ${pub.tipo||''}
- Classe: ${pub.classe||''}
- Órgão/Vara: ${pub.orgao||''}
- Processo: ${pub.processo||''}
- Partes: ${pub.partes||''}
- Data publicação: ${pub.dataPublicacao||''}
- Data disponibilização: ${pub.dataDisponibilizacao||pub.dataPublicacao||''}
- Conteúdo: ${(pub.conteudo||'').slice(0,2500)}

Data de hoje: ${hoje}`;
  try {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST', signal: AbortSignal.timeout(25000),
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({ model:'gpt-4o-mini', temperature:0.1, response_format:{type:'json_object'},
        messages:[{role:'user',content:prompt}] })
    });
    if (!r.ok) return null;
    const d = await r.json();
    return JSON.parse(d.choices[0].message.content);
  } catch { return null; }
}

  const localAnalise = useMemo(()=>analisarPublicacao(pub),[pub.id]);
  const [aiData, setAiData] = useState(null);
  const [aiStatus, setAiStatus] = useState('idle');
  const [prazoData, setPrazoData] = useState(localAnalise.prazo||'');

    if (!localStorage.getItem(OPENAI_KEY_LS)) return;
    setAiStatus('loading');
    analisarComOpenAI(pub).then(res=>{
      if (res) {
        setAiData(res);
        if (res.peca) setPecaTipo(res.peca);
        if (res.prazo) setPrazoData(res.prazo);
        setAiStatus('done');
      } else { setAiStatus('error'); }

  },[pub.id]);

  const urgMap = { baixa:{bg:'#eef2e8',color:'#4a6430',label:'BAIXA'}, media:{bg:'#fef9c3',color:'#7c6b00',label:'MÉDIA'}, alta:{bg:'#fff0e5',color:'#b84800',label:'ALTA'}, altissima:{bg:'#fceaea',color:'#b91c1c',label:'ALTÍSSIMA'} };

            {aiStatus==='done'&&<span style={{fontFamily:'system-ui',fontSize:'0.7rem',color:'#6ee7b7'}}>✅ GPT-4o-mini</span>}
            {aiStatus==='error'&&<span style={{fontFamily:'system-ui',fontSize:'0.7rem',color:'#fbbf24'}}>⚠️ Análise local</span>}
            <button onClick={onClose} style={{background:'none',border:'none',color:'#888',fontSize:'1.4rem',cursor:'pointer',lineHeight:1,padding:0}}>×</button>
          </div>
        </div>

        {/* Corpo rolável */}
        <div style={{overflowY:'auto',flex:1}}>

          {/* Chave OpenAI — só mostra se não configurada */}
          {!localStorage.getItem(OPENAI_KEY_LS)&&(
            <div style={{background:'#fffbeb',borderBottom:'1px solid #fde68a',padding:'0.75rem 1.25rem'}}>
              <p style={{fontFamily:'system-ui',fontSize:'0.75rem',fontWeight:600,color:'#92400e',marginBottom:'0.5rem'}}>🔑 Configure a chave OpenAI para análise com GPT-4o-mini</p>
              <form onSubmit={salvarKey} style={{display:'flex',gap:'0.5rem'}}>
                <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="sk-..." style={{flex:1,fontFamily:'system-ui',fontSize:'0.75rem',border:'1px solid #fcd34d',borderRadius:'4px',padding:'0.35rem 0.6rem',background:'white'}}/>
                <button type="submit" style={{fontFamily:'system-ui',fontSize:'0.75rem',fontWeight:600,background:'#d97757',color:'white',border:'none',borderRadius:'4px',padding:'0.35rem 0.8rem',cursor:'pointer'}}>Salvar e analisar</button>
              </form>
            </div>
          )}

          {/* Publicação analisada */}
          <AnaliseSection titulo="Publicação analisada">
            <p style={{fontSize:'0.8rem',fontWeight:700,color:'#333',marginBottom:'0.25rem'}}>{pub.tipo}{pub.classe&&pub.classe!==pub.tipo?' — '+pub.classe:''}</p>
            <p style={{fontSize:'0.75rem',color:'#777',marginBottom:'0.5rem'}}>{pub.partes}</p>
            <p style={{fontSize:'0.85rem',lineHeight:1.65,color:'#444'}}>{pub.conteudo}</p>
          </AnaliseSection>

          {/* 0. TRIAGEM RÁPIDA */}
          <AnaliseSection titulo="0. Triagem rápida" destaque>
            <div style={{background: urgStyle.bg, border:`1px solid ${urgStyle.color}33`, borderRadius:'6px', padding:'0.75rem 1rem'}}>
              <p style={{fontSize:'0.9rem',fontWeight:700,color: urgStyle.color,lineHeight:1.5}}>
                {aiData?.triagem || `${urgStyle.label} — ${localAnalise.peca || 'Verificar prazo'} | Data-limite: ${fmtDate(localAnalise.prazo)}`}
              </p>
            </div>
          </AnaliseSection>

          {/* 1. O QUE ACONTECEU */}
          {(aiData?.o_que_aconteceu) && (
            <AnaliseSection titulo="1. O que aconteceu">
              <p style={{fontSize:'0.875rem',lineHeight:1.7,color:'#333'}}>{aiData.o_que_aconteceu}</p>
            </AnaliseSection>
          )}

          {/* 2. NATUREZA DO ATO */}
          {aiData?.natureza_do_ato && (
            <AnaliseSection titulo="2. Natureza do ato">
              <p style={{fontSize:'0.875rem',lineHeight:1.7,color:'#333'}}>{aiData.natureza_do_ato}</p>
            </AnaliseSection>
          )}

          {/* 3. O QUE FOI DETERMINADO */}
          {aiData?.o_que_foi_determinado && (
            <AnaliseSection titulo="3. O que foi determinado">
              <div style={{fontSize:'0.875rem',lineHeight:1.7,color:'#333',whiteSpace:'pre-line'}}>{aiData.o_que_foi_determinado}</div>
            </AnaliseSection>
          )}

          {/* 4. MEDIDA CABÍVEL */}
          <AnaliseSection titulo="4. Medida cabível">
            <p style={{fontSize:'0.875rem',lineHeight:1.7,fontWeight:600,color:'#1a1a1a'}}>{aiData?.medida_cabivel || localAnalise.peca}</p>
            <p style={{fontSize:'0.78rem',color:'#888',marginTop:'0.25rem'}}>{aiData?.base_legal || localAnalise.base}</p>
          </AnaliseSection>

          {/* 5. PEÇA PROVÁVEL */}
          <AnaliseSection titulo="5. Peça provável" destaque>
            <div style={{background:'white',border:'1px solid #e8e6dc',borderRadius:'6px',padding:'0.75rem 1rem'}}>
              <p style={{fontSize:'1.05rem',fontWeight:700,color:'#141413',margin:0}}>{pecaTipo || localAnalise.peca}</p>
            </div>
          </AnaliseSection>

          {/* 6. PRAZO */}
          <AnaliseSection titulo="6. Prazo" destaque>
            {aiData?.prazo_descricao && (
              <p style={{fontSize:'0.8rem',lineHeight:1.65,color:'#555',marginBottom:'0.75rem',whiteSpace:'pre-line'}}>{aiData.prazo_descricao}</p>
            )}
            {!aiData?.prazo_descricao && localAnalise.dias && (
              <p style={{fontSize:'0.8rem',color:'#666',marginBottom:'0.75rem'}}>{localAnalise.dias} {localAnalise.tipo} a partir da disponibilização · {localAnalise.base}</p>
            )}
            <div style={{background:'white',border:`2px solid #d97757`,borderRadius:'6px',padding:'0.75rem 1rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <p style={{fontFamily:'system-ui',fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#d97757',margin:0}}>Data-limite</p>
                <p style={{fontSize:'1.2rem',fontWeight:700,color:'#141413',margin:'0.2rem 0 0'}}>{fmtDate(prazoData || localAnalise.prazo)}</p>
              </div>
              {diasRestantes!==null && (
                <div style={{textAlign:'center',padding:'0.5rem 1rem',borderRadius:'6px',background: diasRestantes<0?'#fceaea':diasRestantes<=5?'#fff0e5':'#eef2e8'}}>
                  <p style={{fontSize:'1.4rem',fontWeight:700,color: diasRestantes<0?'#b91c1c':diasRestantes<=5?'#b84800':'#4a6430',margin:0}}>{Math.abs(diasRestantes)}</p>
                  <p style={{fontFamily:'system-ui',fontSize:'0.65rem',color:'#888',margin:0}}>{diasRestantes<0?'dias atrás':diasRestantes===0?'vence hoje':'dias restantes'}</p>
                </div>
              )}
            </div>
          </AnaliseSection>

          {/* 7. URGÊNCIA */}
          {aiData?.urgencia && (
            <AnaliseSection titulo="7. Urgência">
              <span style={{display:'inline-block',padding:'0.3rem 1rem',borderRadius:'9999px',fontFamily:'system-ui',fontSize:'0.8rem',fontWeight:700,background:urgStyle.bg,color:urgStyle.color,border:`1px solid ${urgStyle.color}44`}}>{urgStyle.label}</span>
            </AnaliseSection>
          )}

          {/* 8. RISCOS DA INÉRCIA */}
          {aiData?.riscos_da_inercia?.length > 0 && (
            <AnaliseSection titulo="8. Riscos da inércia">
              <ul style={{listStyle:'none',margin:0,padding:0,display:'flex',flexDirection:'column',gap:'0.4rem'}}>
                {aiData.riscos_da_inercia.map((r,i)=>(
                  <li key={i} style={{display:'flex',gap:'0.5rem',fontSize:'0.875rem',color:'#444',lineHeight:1.5}}>
                    <span style={{color:'#dc2626',flexShrink:0,marginTop:'0.15rem'}}>✗</span><span>{r}</span>
                  </li>
                ))}
              </ul>
            </AnaliseSection>
          )}

          {/* 9. CHECKLIST */}
          {aiData?.checklist?.length > 0 && (
            <AnaliseSection titulo="9. Checklist — O que reunir">
              <ul style={{listStyle:'none',margin:0,padding:0,display:'flex',flexDirection:'column',gap:'0.4rem'}}>
                {aiData.checklist.map((c,i)=>(
                  <li key={i} style={{display:'flex',gap:'0.5rem',fontSize:'0.875rem',color:'#444',lineHeight:1.5}}>
                    <span style={{flexShrink:0,color:'#888',marginTop:'0.1rem'}}>☐</span><span>{c}</span>
                  </li>
                ))}
              </ul>
            </AnaliseSection>
          )}

          {/* Criar prazo + ações */}
          <div style={{borderTop:'2px solid #e8e6dc',background:'white',padding:'1rem 1.25rem'}}>
            <label style={{display:'flex',alignItems:'center',gap:'0.5rem',cursor:'pointer',marginBottom:'0.75rem'}}>
              <input type="checkbox" checked={criarPrazo} onChange={e=>setCriarPrazo(e.target.checked)} style={{width:'16px',height:'16px'}}/>
              <span style={{fontFamily:'system-ui',fontSize:'0.85rem',fontWeight:600,color:'#374151'}}>Criar prazo processual automaticamente</span>
            </label>
            {criarPrazo && (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'0.75rem'}}>
                <div>
                  <label style={{fontFamily:'system-ui',fontSize:'0.7rem',fontWeight:600,color:'#6b7280',display:'block',marginBottom:'0.3rem',textTransform:'uppercase',letterSpacing:'0.05em'}}>Tipo de peça</label>
                  <input value={pecaTipo} onChange={e=>setPecaTipo(e.target.value)} style={{fontFamily:'system-ui',fontSize:'0.85rem',width:'100%',border:'1px solid #d1d5db',borderRadius:'4px',padding:'0.4rem 0.6rem'}}/>
                </div>
                <div>
                  <label style={{fontFamily:'system-ui',fontSize:'0.7rem',fontWeight:600,color:'#6b7280',display:'block',marginBottom:'0.3rem',textTransform:'uppercase',letterSpacing:'0.05em'}}>Data limite</label>
                  <input type="date" value={prazoData} onChange={e=>setPrazoData(e.target.value)} style={{fontFamily:'system-ui',fontSize:'0.85rem',width:'100%',border:'1px solid #d1d5db',borderRadius:'4px',padding:'0.4rem 0.6rem'}}/>
                </div>
              </div>
            )}
            <div style={{display:'flex',justifyContent:'flex-end',gap:'0.5rem'}}>
              <button onClick={onClose} style={{fontFamily:'system-ui',fontSize:'0.85rem',padding:'0.5rem 1rem',border:'1px solid #d1d5db',borderRadius:'4px',background:'white',cursor:'pointer',color:'#374151'}}>Cancelar</button>
              <button onClick={()=>onConfirmar(pub, criarPrazo?{tipo:pecaTipo, data:prazoData, obs:''}:null)}
                style={{fontFamily:'system-ui',fontSize:'0.85rem',fontWeight:700,padding:'0.5rem 1.25rem',border:'none',borderRadius:'4px',background:'#141413',color:'white',cursor:'pointer'}}>
                ✓ {criarPrazo?'Tratar + Criar Prazo':'Marcar como Tratada'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── VIEW PUBLICAÇÕES ───────────────────────────────────────────────────────
function PubCard({ pub, onMarcarLida, onTratar, onCriarPrazo, onAddAgenda, prazos }) {
  const [expanded, setExpanded] = useState(false);
  const [showTratar, setShowTratar] = useState(false);
  const c = STATUS_PUB[pub.status];
  const prazoVinc = pub.prazoVinculado ? prazos.find(p=>p.id===pub.prazoVinculado) : null;
  return (
    <div className={`pub-card border-l-4 ${c.border} ${c.bg} rounded-xl shadow-sm overflow-hidden`}>
      <div className="p-4">
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1.5 flex-wrap mb-1.5">
              <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${c.badge}`}>{c.label}</span>
              <span className="text-xs bg-white border border-gray-200 px-2 py-0.5 rounded-full text-gray-600">{pub.tipo}</span>
              {pub.classe&&<span className="text-xs bg-white border border-gray-200 px-2 py-0.5 rounded-full text-gray-500">{pub.classe}</span>}
            </div>
            <p className="font-bold text-gray-800 text-sm">{pub.processo}</p>
            <p className="text-xs text-gray-500 mt-0.5">{pub.orgao}</p>
          </div>
          <div className="text-right shrink-0">
            <p className="text-xs text-gray-500">Pub.: <span className="font-semibold text-gray-700">{fmtDate(pub.dataPublicacao)}</span></p>
            <p className="text-xs text-gray-400">Disp.: {fmtDate(pub.dataDisponibilizacao)}</p>
            {pub.dataTratamento&&<p className="text-xs text-green-600 font-semibold mt-0.5">??? Tratada: {fmtDate(pub.dataTratamento)}</p>}
          </div>
        </div>
        <p className="text-xs text-gray-600 font-medium mb-1">Partes: <span className="font-normal text-gray-500">{pub.partes}</span></p>
        {prazoVinc&&<div className="flex items-center gap-1.5 mt-1 mb-2">
          <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-medium">?????? Prazo vinculado: {fmtDate(prazoVinc.data)} ??? {prazoVinc.tipo}</span>
        </div>}
        <div className={`text-xs text-gray-600 mt-2`} style={!expanded?{overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}:{}}>
          {pub.conteudo}
        </div>
        <button onClick={()=>setExpanded(v=>!v)} className="text-xs text-indigo-500 hover:underline mt-1">{expanded?'Ver menos ↑':'Ver mais ↓'}</button>
        {pub.diario&&<p className="text-xs text-gray-400 mt-1">{pub.diario}</p>}
      </div>
      <div className="flex items-center gap-1.5 px-4 py-2.5 bg-white border-t flex-wrap">
        {pub.status==='nao_lida'&&<button onClick={()=>onMarcarLida(pub.id)} className="text-xs px-2.5 py-1 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium transition">✓ Lida</button>}
        {pub.status!=='tratada'&&<button onClick={()=>setShowTratar(true)} className="text-xs px-2.5 py-1 rounded-lg border border-green-500 bg-green-600 text-white hover:bg-green-700 font-semibold transition">⚖️ Tratar</button>}
        <p className="text-xs text-gray-400 ml-auto">#{pub.id.replace('pub_','').replace('aasp_','').replace('manual_','')}</p>
      </div>
      {showTratar&&<TratarModal pub={pub} onClose={()=>setShowTratar(false)} onConfirmar={(p,prazoInfo)=>{ onTratar(p,prazoInfo); setShowTratar(false); }}/>}
    </div>
  );
}

function PublicacoesView({ pubs, prazos, onMarcarLida, onTratar, onCriarPrazo, onAddAgenda, fazSync, aaspSync, onRefreshPubs }) {
  const [filtro, setFiltro] = useState('nao_lida');
  const [busca, setBusca] = useState('');
  const [filtroOrigem, setFiltroOrigem] = useState('todas');
  const [autoTratarPub, setAutoTratarPub] = useState(null);
  const autoOpenDone = useRef(false);
  React.useEffect(()=>{
    if (autoOpenDone.current) return;
    const primeira = pubs.find(p=>p.status==='nao_lida');
    if (primeira) { autoOpenDone.current=true; setAutoTratarPub(primeira); }
  },[]);
  const [syncFaz, setSyncFaz] = useState(null);
  const [syncMsg, setSyncMsg] = useState('');
  const [syncLink, setSyncLink] = useState(null);
  async function triggerSync() {
    setSyncFaz('loading'); setSyncMsg(''); setSyncLink(null);
    try {
      const r = await fetch('http://localhost:3333/sync/faz', { method:'POST', signal: AbortSignal.timeout(15000) });
      if (r.ok) {
        let novas = [];
        try {
          const data = await r.json();
          novas = data.publications || data.novas || data.pubs || (Array.isArray(data) ? data : []);
        } catch(e) {}
        if (novas.length > 0) {
          onRefreshPubs(novas);
          setSyncMsg(novas.length + ' nova(s) publicação(ões) recebida(s)!');
          setSyncFaz('ok');
          setTimeout(()=>{ setSyncFaz(null); setSyncMsg(''); }, 4000);
        } else {
          setSyncMsg('Sync OK — recarregando para buscar atualizações...');
          setSyncFaz('ok');
          setTimeout(()=>{ setSyncFaz(null); window.location.reload(); }, 1800);
        }
      } else {
        setSyncFaz('erro'); setSyncMsg('Cowork retornou erro. Acesse manualmente:');
        setSyncLink('https://app.faz.adv.br/#/publicacoes/nao-lidas');
        setTimeout(()=>{ setSyncFaz(null); setSyncMsg(''); setSyncLink(null); }, 8000);
      }
    } catch {
      setSyncFaz('erro'); setSyncMsg('Cowork não encontrado. Acesse manualmente:');
      setSyncLink('https://app.faz.adv.br/#/publicacoes/nao-lidas');
      setTimeout(()=>{ setSyncFaz(null); setSyncMsg(''); setSyncLink(null); }, 8000);
    }
  }
  const [modalPub, setModalPub] = useState(false);
  const emptyPubForm = { processo:'', partes:'', tipo:'Despacho', orgao:'', dataPublicacao: isoDate(new Date()), conteudo:'', origem:'faz' };
  const [pubForm, setPubForm] = useState(emptyPubForm);
  function salvarPubManual(ev) {
    ev.preventDefault();
    if (!pubForm.processo.trim() && !pubForm.conteudo.trim()) return;
    const novaPub = { ...pubForm, id:'manual_'+Date.now(), status:'nao_lida', classe: pubForm.tipo };
    onRefreshPubs([novaPub]);
    setPubForm(emptyPubForm);
    setModalPub(false);
  }
  const counts = useMemo(()=>{ const c={nao_lida:0,lida:0,tratada:0}; pubs.forEach(p=>c[p.status]++); return c; },[pubs]);
  const filtered = useMemo(()=> pubs.filter(p=>{
    if(filtro!=='todos'&&p.status!==filtro) return false;
    if(filtroOrigem==='faz'&&p.origem!=='faz') return false;
    const q=busca.toLowerCase();
    return !q||[p.processo,p.tipo,p.classe,p.partes,p.orgao].some(s=>(s||'').toLowerCase().includes(q));
  }).sort((a,b)=>new Date(b.dataPublicacao)-new Date(a.dataPublicacao)),[pubs,filtro,busca,filtroOrigem]);

  const FILTROS=[
    {k:'nao_lida',l:'Não lidas',n:counts.nao_lida},
    {k:'lida',l:'Lidas',n:counts.lida},
    {k:'tratada',l:'Tratadas',n:counts.tratada},
    {k:'todos',l:'Todas',n:pubs.length},
  ];
  return (
    <div className="space-y-4">
      {autoTratarPub&&<TratarModal pub={autoTratarPub} onClose={()=>setAutoTratarPub(null)} onConfirmar={(p,prazoInfo)=>{ onTratar(p,prazoInfo); setAutoTratarPub(null); }}/>}
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h2 className="font-bold text-gray-700 text-lg">Publicações</h2>
        <div className="flex items-center gap-2 flex-wrap">
          {counts.nao_lida > 0 && (
            <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-xl px-3 py-2">
              <span className="text-blue-600 font-bold text-lg">{counts.nao_lida}</span>
              <span className="text-blue-600 text-sm font-medium">não lida{counts.nao_lida>1?'s':''}</span>
            </div>
          )}
          <button onClick={()=>setModalPub(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">+ Nova publicação</button>
        </div>
      </div>

      {/* PAINEL DE SINCRONIZAÇÃO */}
      <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm">
        <div className="flex items-center justify-between mb-3">
          <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Fontes de publicações</p>
          <button onClick={()=>window.location.reload()} className="text-xs px-3 py-1 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium transition">Recarregar página</button>
        </div>
        <div className="flex flex-col gap-2 p-3 rounded-xl bg-indigo-50 border border-indigo-200">
            <div className="flex items-center gap-2">
              <span className="text-lg">⚖️</span>
              <div className="flex-1">
                <p className="text-xs font-bold text-indigo-700">FAZ — SEDEP 5.0</p>
                <p className="text-xs text-indigo-500">{fazSync ? `Última sync: ${new Date(fazSync).toLocaleString('pt-BR')}` : 'Nunca sincronizado'}</p>
              </div>
              <span className={`w-2 h-2 rounded-full shrink-0 ${syncFaz==='ok'?'bg-green-500':syncFaz==='loading'?'bg-yellow-400':syncFaz==='erro'?'bg-red-500':fazSync?'bg-green-400':'bg-gray-300'}`}/>
            </div>
            <button onClick={()=>triggerSync()} disabled={syncFaz==='loading'}
              className={`w-full text-xs py-1.5 rounded-lg font-semibold transition ${syncFaz==='loading'?'bg-gray-300 text-gray-500 cursor-not-allowed':syncFaz==='ok'?'bg-green-600 text-white':syncFaz==='erro'?'bg-red-500 text-white':'bg-indigo-600 hover:bg-indigo-700 text-white'}`}>
              {syncFaz==='loading'?'⏳ Sincronizando...':syncFaz==='ok'?'✅ Sincronizado!':syncFaz==='erro'?'❌ Erro — cowork offline':'🔄 Sincronizar FAZ'}
            </button>
          </div>
        {syncMsg && <p className={`text-xs mt-2 text-center font-semibold ${syncMsg.includes('nova')? 'text-green-600' : syncMsg.includes('erro')||syncMsg.includes('não encontrado')? 'text-red-500' : 'text-indigo-600'}`}>{syncMsg}</p>}
        {syncLink && <a href={syncLink} target="_blank" rel="noopener noreferrer" className="block text-xs mt-1 text-center text-indigo-600 underline font-semibold">↗ Acessar FAZ manualmente</a>}
        {!syncMsg && <p className="text-xs text-gray-400 mt-2 text-center">💡 Clique em Sincronizar para buscar novas publicações via cowork.</p>}
      </div>

      {/* FILTRO POR ORIGEM */}
      <div className="flex gap-2">
        {[{k:'todas',l:'Todas as fontes'},{k:'faz',l:'⚖️ FAZ'}].map(o=>(
          <button key={o.k} onClick={()=>setFiltroOrigem(o.k)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtroOrigem===o.k?'bg-gray-700 text-white border-gray-700':'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>{o.l}</button>
        ))}
      </div>
      <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white"
        placeholder="Buscar por processo, tipo, classe, partes..." value={busca} onChange={e=>setBusca(e.target.value)} />
      <div className="flex gap-2 flex-wrap">
        {FILTROS.map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)}
            className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtro===f.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>
            {f.l} <span className="opacity-70">({f.n})</span>
          </button>
        ))}
      </div>
      {filtered.length===0 ? (
        <div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">📋</p><p className="font-semibold">Nenhuma publicação encontrada</p></div>
      ) : (
        <div className="space-y-3">
          {filtered.map(p=><PubCard key={p.id} pub={p} prazos={prazos} onMarcarLida={onMarcarLida} onTratar={onTratar} onCriarPrazo={onCriarPrazo}/>) }
        </div>
      )}
      {modalPub && <Overlay onClose={()=>setModalPub(false)}><ModalBox title="Nova Publicação" onClose={()=>setModalPub(false)}>
        <form onSubmit={salvarPubManual} className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Processo"><Inp value={pubForm.processo} onChange={e=>setPubForm(p=>({...p,processo:e.target.value}))} placeholder="0000000-00.0000.0.00.0000"/></Field>
            <Field label="Data da publicação"><Inp type="date" value={pubForm.dataPublicacao} onChange={e=>setPubForm(p=>({...p,dataPublicacao:e.target.value}))}/></Field>
          </div>
          <Field label="Partes"><Inp value={pubForm.partes} onChange={e=>setPubForm(p=>({...p,partes:e.target.value}))} placeholder="Ex: João Silva x Maria Souza"/></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Tipo / Classe"><Inp value={pubForm.tipo} onChange={e=>setPubForm(p=>({...p,tipo:e.target.value}))} placeholder="Ex: Despacho, Decisão..."/></Field>
            <Field label="Órgão / Vara"><Inp value={pubForm.orgao} onChange={e=>setPubForm(p=>({...p,orgao:e.target.value}))} placeholder="Ex: 2ª Vara de Família"/></Field>
          </div>
          <Field label="Fonte">
            <Sel value={pubForm.origem} onChange={e=>setPubForm(p=>({...p,origem:e.target.value}))}>
              <option value="faz">⚖️ FAZ — SEDEP</option>
            </Sel>
          </Field>
          <Field label="Conteúdo / Resumo"><Txta value={pubForm.conteudo} onChange={e=>setPubForm(p=>({...p,conteudo:e.target.value}))} placeholder="Cole aqui o texto da publicação..." rows={4}/></Field>
          <MFooter onClose={()=>setModalPub(false)}/>
        </form>
      </ModalBox></Overlay>}
    </div>
  );
}


function Dashboard({ prazos, compromissos, pubs, pends, inics, honors, procus, onGoTo }) {
  const counts = useMemo(()=>{ const c={vencido:0,urgente:0,proximo:0,ok:0,cumprido:0}; prazos.forEach(p=>{c[getPrazoStatus(p.data,p.cumprido)]++;}); return c; },[prazos]);
  const [syncFaz, setSyncFaz] = React.useState(null);
  const [syncLink, setSyncLink] = React.useState(null);
  async function triggerSync() {
    setSyncFaz('loading'); setSyncLink(null);
    try {
      const r = await fetch('http://localhost:3333/sync/faz', { method:'POST', signal: AbortSignal.timeout(10000) });
      if (r.ok) { setSyncFaz('ok'); setTimeout(()=>{ setSyncFaz(null); window.location.reload(); }, 1500); }
      else { setSyncFaz('erro'); setSyncLink('https://app.faz.adv.br/#/publicacoes/nao-lidas'); setTimeout(()=>{ setSyncFaz(null); setSyncLink(null); }, 8000); }
    } catch { setSyncFaz('erro'); setSyncLink('https://app.faz.adv.br/#/publicacoes/nao-lidas'); setTimeout(()=>{ setSyncFaz(null); setSyncLink(null); }, 8000); }
  }
  const pubNaoLidas = pubs.filter(p=>p.status==='nao_lida').length;
  const pendAtivas  = (pends||[]).filter(p=>p.status==='pendente').length;
  const pendVencidas = (pends||[]).filter(p=>p.status==='pendente'&&p.dataLimite&&parseDate(p.dataLimite)<today()).length;
  const inicsAtivas = (inics||[]).filter(i=>i.status!=='distribuida').length;
  const honorAtrasados = (honors||[]).filter(h=>h.status==='atrasado').length;
  const honorPendente = (honors||[]).filter(h=>h.status!=='pago').reduce((s,h)=>s+((h.valorCombinado||0)-(h.valorPago||0)),0);
  const procuAlertas = (procus||[]).filter(p=>getProcuStatus(p.dataValidade)!=='ativa').length;
  const prescricaoAlertas = useMemo(()=>(inics||[]).filter(i=>{ const p=calcPrescricao(i); return p&&!p.imprescritivel&&p.diffDias<=180; }).sort((a,b)=>{ const pa=calcPrescricao(a),pb=calcPrescricao(b); return (pa?.diffDias||999)-(pb?.diffDias||999); }),[inics]);

  const todayStr = isoDate(new Date());
  const compHoje = useMemo(()=>compromissos.filter(c=>!c.concluido&&c.data===todayStr).sort((a,b)=>a.hora>b.hora?1:-1),[compromissos,todayStr]);
  const prazosHoje = useMemo(()=>prazos.filter(p=>!p.cumprido&&p.data===todayStr),[prazos,todayStr]);
  const today7 = useMemo(()=>prazos.filter(p=>{ if(p.cumprido)return false; const d=parseDate(p.data); if(!d)return false; const diff=Math.ceil((d-today())/86400000); return diff>=0&&diff<=7; }).sort((a,b)=>new Date(a.data)-new Date(b.data)),[prazos]);
  const compUpcoming = useMemo(()=>compromissos.filter(c=>!c.concluido&&c.data&&parseDate(c.data)>=today()).sort((a,b)=>new Date(a.data)-new Date(b.data)).slice(0,3),[compromissos]);

  const diaSemana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date().getDay()];
  const dataHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const fmtBRL = v => v?.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}) || 'R$ 0,00';

  return (
    <div className="space-y-5">
      {/* CABEÇALHO DO DIA */}
      <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm">
        <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide">{diaSemana}</p>
        <p className="text-lg font-black text-gray-800">{dataHoje}</p>
        {(prazosHoje.length>0||compHoje.length>0) ? (
          <div className="mt-2 space-y-1">
            {prazosHoje.map(p=><p key={p.id} className="text-xs text-red-700 font-semibold">⚖️ Prazo HOJE: {p.tipo} – {p.parte}</p>)}
            {compHoje.map(c=><p key={c.id} className="text-xs text-indigo-700 font-semibold">📅 {c.hora||'Hoje'}: {c.titulo}</p>)}
          </div>
        ) : <p className="text-xs text-green-600 mt-1 font-medium">✓ Sem prazos ou compromissos para hoje.</p>}
      </div>

      {(counts.vencido>0||counts.urgente>0||honorAtrasados>0||procuAlertas>0) && (
        <div className="space-y-2">
          {counts.vencido>0&&<div className="rounded-xl p-3 border bg-red-50 border-red-300 flex items-center gap-3 cursor-pointer" onClick={()=>onGoTo('prazos')}><span className="text-xl">🚨</span><p className="text-red-700 font-bold text-sm flex-1">{counts.vencido} prazo{counts.vencido>1?'s':''} VENCIDO{counts.vencido>1?'S':''}! Clique para ver.</p><span className="text-red-400">›</span></div>}
          {counts.urgente>0&&<div className="rounded-xl p-3 border bg-violet-50 border-violet-300 flex items-center gap-3 cursor-pointer" onClick={()=>onGoTo('prazos')}><span className="text-xl">⏰</span><p className="text-violet-700 font-bold text-sm flex-1">{counts.urgente} prazo{counts.urgente>1?'s':''} urgente{counts.urgente>1?'s':''} — vence em até 3 dias.</p><span className="text-violet-400">›</span></div>}

                <p className="text-xs font-bold text-indigo-700">FAZ — SEDEP 5.0</p>

            </button>
          </div>
          {syncLink && <a href={syncLink} target="_blank" rel="noopener noreferrer" className="block text-xs mt-1 text-center text-indigo-600 underline font-semibold">↗ Acessar FAZ manualmente</a>}
        <p className="text-xs text-gray-400 mt-2 text-center">💡 Recarregue a página (F5) após sincronizar para ver novas publicações</p>
      </div>

      {/* ALERTAS PRESCRIÇÃO */}
      {prescricaoAlertas.length>0&&(
        <div className="bg-white rounded-2xl border border-orange-200 p-4 shadow-sm">
          <p className="text-xs font-bold text-orange-600 uppercase tracking-wide mb-2">⏱ Alertas de Prescrição ({prescricaoAlertas.length})</p>
          <div className="space-y-2">
            {prescricaoAlertas.slice(0,4).map(i=>{ const p=calcPrescricao(i); return (
              <div key={i.id} className={`flex items-center justify-between rounded-lg px-3 py-2 border text-xs ${p.diffDias<0?'bg-red-50 border-red-300':p.diffDias<=90?'bg-orange-50 border-orange-300':'bg-yellow-50 border-yellow-300'}`}>
                <div className="min-w-0"><p className="font-bold text-gray-800 truncate">{i.cliente}</p><p className="text-gray-500 truncate">{i.tipoAcao}</p></div>
                <span className={`ml-2 shrink-0 font-bold px-2 py-0.5 rounded-full text-white ${p.diffDias<0?'bg-red-600':p.diffDias<=90?'bg-orange-500':'bg-yellow-500'}`}>
                  {p.diffDias<0?'PRESCRITO':p.diffDias+'d'}
                </span>
              </div>
            );})}
          </div>
          <button onClick={()=>onGoTo('iniciais')} className="text-xs text-indigo-600 hover:underline mt-2">Ver todas as iniciais →</button>
        </div>

      {/* RESUMO RÁPIDO */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
        {[{l:'Prazos vencidos',v:counts.vencido,color:'text-red-600',bg:'bg-red-50 border-red-200',tab:'prazos'},
          {l:'Pendências ativas',v:pendAtivas,color:'text-amber-600',bg:'bg-amber-50 border-amber-200',tab:'pendencias'},
          {l:'A receber',v:fmtBRL(honorPendente),color:'text-green-600',bg:'bg-green-50 border-green-200',tab:'financeiro'},
          {l:'Publicações novas',v:pubNaoLidas,color:'text-blue-600',bg:'bg-blue-50 border-blue-200',tab:'publicacoes'}
        ].map(card=>(

        <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">

        </div>
        <div className="bg-white rounded-2xl border border-gray-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-gray-700 text-sm">📅 Próximos compromissos</h3>
            <button onClick={()=>onGoTo('agenda')} className="text-xs text-indigo-600 hover:underline">Ver agenda</button>
          </div>
          {compUpcoming.length===0?<p className="text-sm text-gray-400 italic">Nenhum compromisso agendado.</p>:
            <div className="space-y-2">{compUpcoming.map(c=><div key={c.id} className="flex items-center justify-between rounded-lg px-3 py-2 border bg-indigo-50 border-indigo-200"><div className="min-w-0"><p className="text-xs font-bold text-gray-700 truncate">{c.titulo}</p>{c.tipo&&<p className="text-xs text-indigo-500">{c.tipo}</p>}</div><div className="text-right ml-2 shrink-0"><p className="text-xs font-bold text-gray-700">{fmtDate(c.data)}</p>{c.hora&&<p className="text-xs text-gray-500">{c.hora}</p>}</div></div>)}</div>}
        </div>
      </div>
    </div>
  );
}

function PrazosView({ prazos, onSave, onDelete, onToggle, onAddComp }) {
  const [modal, setModal] = useState(null);
  const [del, setDel] = useState(null);
  const [busca, setBusca] = useState('');
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const COLS = [
    { k:'vencido',  label:'Vencido',  icon:'🔴', headerCls:'bg-red-500',    colCls:'border-red-300 bg-red-50' },
    { k:'urgente',  label:'Urgente',  icon:'🟣', headerCls:'bg-violet-500', colCls:'border-violet-200 bg-violet-50' },
    { k:'proximo',  label:'Próximo',  icon:'🟡', headerCls:'bg-yellow-400', colCls:'border-yellow-200 bg-yellow-50' },
    { k:'ok',       label:'No Prazo', icon:'🟢', headerCls:'bg-green-500',  colCls:'border-green-200 bg-green-50' },
    { k:'cumprido', label:'Cumprido', icon:'✅', headerCls:'bg-gray-400',   colCls:'border-gray-200 bg-gray-50' },
  ];

  const byCol = useMemo(() => {
    const m = { vencido:[], urgente:[], proximo:[], ok:[], cumprido:[] };
    const q = busca.toLowerCase();
    prazos.forEach(p => {
      if (q && ![p.processo,p.parte,p.tipo,p.tribunal||'',p.vara||''].some(s=>s.toLowerCase().includes(q))) return;
      m[getPrazoStatus(p.data, p.cumprido)].push(p);
    });
    Object.values(m).forEach(arr => arr.sort((a,b) => new Date(a.data) - new Date(b.data)));
    return m;
  }, [prazos, busca]);

  function handleDragStart(e, prazo) {
    setDragging(prazo);
    e.dataTransfer.effectAllowed = 'move';
  }
  function handleDrop(e, colKey) {
    e.preventDefault();
    if (!dragging) return;
    if (colKey === 'cumprido' && !dragging.cumprido) onToggle(dragging.id);
    else if (colKey !== 'cumprido' && dragging.cumprido) onToggle(dragging.id);
    setDragging(null); setDragOver(null);
  }

  const totalAtivos = prazos.filter(p=>!p.cumprido).length;

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="font-bold text-gray-700">Prazos Processuais</h2>
          <p className="text-xs text-gray-400">{totalAtivos} ativo{totalAtivos!==1?'s':''} · arraste para mover entre colunas</p>
        </div>
        <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition">+ Novo Prazo</button>
      </div>
      <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar processo, parte, tipo..." value={busca} onChange={e=>setBusca(e.target.value)} />

      {/* Kanban board */}
      <div className="flex gap-3 overflow-x-auto pb-4" style={{minHeight:'65vh'}}>
        {COLS.map(col => {
          const cards = byCol[col.k];
          const isOver = dragOver === col.k;
          return (
            <div key={col.k}
              className={`flex-shrink-0 rounded-2xl border-2 flex flex-col transition-all duration-150 ${col.colCls} ${isOver?'ring-2 ring-indigo-400 ring-offset-1 scale-[1.01]':''}`}
              style={{width:'260px'}}
              onDragOver={e=>{e.preventDefault();setDragOver(col.k);}}
              onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
              onDrop={e=>handleDrop(e,col.k)}
            >
              <div className={`rounded-t-xl px-3 py-2.5 flex items-center justify-between text-white ${col.headerCls}`}>
                <span className="font-bold text-sm">{col.icon} {col.label}</span>
                <span className="text-xs bg-white bg-opacity-25 px-2 py-0.5 rounded-full font-bold">{cards.length}</span>
              </div>
              <div className="flex-1 p-2 space-y-2 overflow-y-auto" style={{maxHeight:'62vh'}}>
                {isOver && dragging && <div className="border-2 border-dashed border-indigo-400 rounded-xl h-14 flex items-center justify-center text-indigo-400 text-xs font-semibold">Soltar aqui</div>}
                {cards.length===0 && !isOver && <div className="text-center py-10 text-gray-300 text-xs italic select-none">Nenhum prazo</div>}
                {cards.map(p => (
                  <div key={p.id} draggable
                    onDragStart={e=>handleDragStart(e,p)}
                    onDragEnd={()=>{setDragging(null);setDragOver(null);}}
                    className={`cursor-grab active:cursor-grabbing transition-opacity ${dragging?.id===p.id?'opacity-40':''}`}
                  >
                    <PrazoKanbanCard prazo={p} onEdit={setModal} onDelete={id=>setDel(id)} onToggle={onToggle} onAddComp={onAddComp}/>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {modal&&<PrazoModal initial={modal==='new'?null:modal} onSave={p=>{onSave(p);setModal(null);}} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDelete(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>
  );
}

// ── VIEW COMPROMISSOS ──────────────────────────────────────────────────────
function CompromissosView({ compromissos, prazos, onSave, onDelete, onToggle, initialNew, onClearInitial }) {
  const [modal, setModal] = useState(initialNew||null);
  const [del, setDel] = useState(null);
  const [busca, setBusca] = useState('');
  const [filtro, setFiltro] = useState('pendentes');
  React.useEffect(()=>{ if(initialNew){ setModal(initialNew); onClearInitial&&onClearInitial(); } },[initialNew]);
  const filtered = useMemo(()=>compromissos.filter(c=>{ if(filtro==='pendentes'&&c.concluido)return false; if(filtro==='concluidos'&&!c.concluido)return false; const q=busca.toLowerCase(); return !q||[c.titulo,c.tipo||'',c.processo||'',c.local||''].some(s=>s.toLowerCase().includes(q)); }).sort((a,b)=>{ if(a.concluido!==b.concluido)return a.concluido?1:-1; return new Date(a.data)-new Date(b.data); }),[compromissos,busca,filtro]);
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="font-bold text-gray-700">Compromissos</h2>
        <button onClick={()=>setModal('new')} className="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition">+ Novo Compromisso</button>
      </div>
      <input className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white" placeholder="🔍 Buscar..." value={busca} onChange={e=>setBusca(e.target.value)}/>
      <div className="flex gap-2 flex-wrap">{[{k:'todos',l:'Todos'},{k:'pendentes',l:'Pendentes'},{k:'concluidos',l:'Concluídos'}].map(f=><button key={f.k} onClick={()=>setFiltro(f.k)} className={`text-xs px-3 py-1.5 rounded-full border font-semibold transition ${filtro===f.k?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-300 hover:bg-indigo-50'}`}>{f.l}</button>)}</div>
      {filtered.length===0?<div className="text-center py-14 text-gray-400"><p className="text-4xl mb-2">📅</p><p className="font-semibold">Nenhum compromisso encontrado</p></div>:
        <div className="grid sm:grid-cols-2 gap-3">{filtered.map(c=><CompCard key={c.id} comp={c} onEdit={setModal} onDelete={id=>setDel(id)} onToggle={onToggle}/>)}</div>}
      {modal&&<CompModal initial={modal==='new'?null:modal} prazos={prazos} onSave={c=>{onSave(c);setModal(null);}} onClose={()=>setModal(null)}/>}
      {del&&<ConfirmModal onConfirm={()=>{onDelete(del);setDel(null);}} onClose={()=>setDel(null)}/>}
    </div>
  );
}

// ── VIEW AGENDA ────────────────────────────────────────────────────────────
function AgendaView({ prazos, compromissos, onNewComp }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [selected, setSelected] = useState(null);
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const todayStr = isoDate(new Date());

  const eventsByDay = useMemo(()=>{
    const map={};
    prazos.forEach(p=>{ if(!p.data)return; const d=parseDate(p.data); if(d.getFullYear()===year&&d.getMonth()===month){ if(!map[p.data])map[p.data]={prazos:[],comps:[]}; map[p.data].prazos.push(p); } });
    compromissos.forEach(c=>{ if(!c.data)return; const d=parseDate(c.data); if(d.getFullYear()===year&&d.getMonth()===month){ if(!map[c.data])map[c.data]={prazos:[],comps:[]}; map[c.data].comps.push(c); } });
    return map;
  },[prazos,compromissos,year,month]);

  function prevMonth(){ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); setSelected(null); }
  function nextMonth(){ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); setSelected(null); }

  const selKey = selected?`${year}-${String(month+1).padStart(2,'0')}-${String(selected).padStart(2,'0')}`:null;
  const selEv = selKey?eventsByDay[selKey]:null;

  // Chip label: "Prazo – [parte] – [tribunal]" or "[hora] [tipo] – [titulo]"
  function prazoChipLabel(p) {
    const parts = ['Prazo'];
    if (p.parte) parts.push(p.parte.split(' ').slice(0,2).join(' '));
    if (p.tribunal) parts.push(p.tribunal);
    else if (p.vara) parts.push(p.vara.slice(0,25));
    return parts.join(' – ');
  }
  function compChipLabel(c) {
    const hora = c.hora ? c.hora+' ' : '';
    const tipo = c.tipo || '';
    const titulo = c.titulo ? ' – '+c.titulo : '';
    return hora + tipo + titulo;
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="font-bold text-gray-700">Agenda</h2>
        <button onClick={onNewComp} className="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition">+ Compromisso</button>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div className="flex items-center justify-between px-5 py-3 bg-indigo-700 text-white">
          <button onClick={prevMonth} className="px-3 py-1 rounded-lg hover:bg-indigo-600 font-bold text-lg">‹</button>
          <h3 className="font-bold text-lg">{MESES[month]} {year}</h3>
          <button onClick={nextMonth} className="px-3 py-1 rounded-lg hover:bg-indigo-600 font-bold text-lg">›</button>
        </div>
        <div className="grid grid-cols-7 border-b bg-gray-50">
          {DIAS_SEMANA.map(d=><div key={d} className="text-center text-xs font-bold text-gray-500 py-2">{d}</div>)}
        </div>
        <div className="grid grid-cols-7">
          {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i} className="calendar-day border-r border-b border-gray-100 bg-gray-50/50"/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const day=i+1;
            const key=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const ev=eventsByDay[key];
            const isToday=key===todayStr;
            const isSel=selected===day;
            const isWeekend = (new Date(year,month,day).getDay()===0||new Date(year,month,day).getDay()===6);
            return (
              <div key={day} onClick={()=>setSelected(isSel?null:day)}
                className={`calendar-day border-r border-b border-gray-100 p-1 cursor-pointer transition
                  ${isToday?'bg-indigo-50':''}
                  ${isWeekend&&!isToday?'bg-gray-50/60':''}
                  ${isSel?'ring-2 ring-inset ring-indigo-400':'hover:bg-blue-50/40'}`}>
                <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full text-xs font-bold mb-0.5
                  ${isToday?'bg-indigo-600 text-white':'text-gray-600'}`}>{day}</span>
                {ev&&<div className="space-y-0.5">
                  {ev.prazos.map(p=>{
                    const st=getPrazoStatus(p.data,p.cumprido);
                    const c=STATUS_PRAZO[st];
                    const bgMap={vencido:'#ef4444',urgente:'#f97316',proximo:'#facc15',ok:'#22c55e',cumprido:'#9ca3af'};
                    return (
                      <span key={p.id} className={`ev-chip text-white font-medium${p.cumprido?' done':''}`}
                        style={{backgroundColor: bgMap[st]||'#6366f1'}}>
                        {prazoChipLabel(p)}
                      </span>
                    );
                  })}
                  {ev.comps.map(c=>(
                    <span key={c.id} className={`ev-chip text-white font-medium${c.concluido?' done':''}`}
                      style={{backgroundColor: c.concluido?'#9ca3af':'#8b5cf6'}}>
                      {compChipLabel(c)}
                    </span>
                  ))}
                </div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Legenda */}
      <div className="flex gap-3 flex-wrap text-xs text-gray-500">
        {[['#ef4444','Vencido'],['#f97316','Urgente'],['#facc15','Próximo'],['#22c55e','No prazo'],['#8b5cf6','Compromisso'],['#9ca3af','Cumprido/Concluído']].map(([color,label])=>(
          <span key={label} className="flex items-center gap-1">
            <span className="w-3 h-3 rounded inline-block" style={{backgroundColor:color}}></span>{label}
          </span>
        ))}
      </div>

      {/* Painel de detalhes do dia selecionado */}
      {selected&&(
        <div className="bg-white rounded-2xl shadow border border-gray-200 p-4">
          <h4 className="font-bold text-gray-700 mb-3 flex items-center gap-2">
            <span className="bg-indigo-600 text-white text-sm px-2.5 py-0.5 rounded-lg">
              {String(selected).padStart(2,'0')}/{String(month+1).padStart(2,'0')}/{year}
            </span>
            <span className="text-sm text-gray-500">
              {selEv?(selEv.prazos.length+selEv.comps.length)+' evento(s)':'Sem eventos'}
            </span>
          </h4>
          {(!selEv||(!selEv.prazos.length&&!selEv.comps.length))
            ? <p className="text-sm text-gray-400 italic">Nenhum evento neste dia.</p>
            : <div className="space-y-2">
                {selEv.prazos.map(p=>{
                  const st=getPrazoStatus(p.data,p.cumprido);
                  const c=STATUS_PRAZO[st];
                  return (
                    <div key={p.id} className={`rounded-xl px-4 py-3 border-l-4 ${c.border} ${c.bg} ${p.cumprido?'opacity-60':''}`}>
                      <div className="flex items-center justify-between gap-2 flex-wrap">
                        <div>
                          <div className="flex items-center gap-2 flex-wrap mb-0.5">
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${c.badge}`}>{c.label}</span>
                            {p.tipo&&<span className="text-xs bg-white border border-gray-200 px-2 py-0.5 rounded-full text-gray-600">{p.tipo}</span>}
                            {p.cumprido&&<span className="text-xs bg-gray-200 text-gray-500 px-2 py-0.5 rounded-full line-through">Cumprido</span>}
                          </div>
                          <p className={`text-sm font-bold text-gray-800 ${p.cumprido?'line-through':''}`}>{p.processo}</p>
                          {p.parte&&<p className="text-xs text-gray-500">{p.parte}</p>}
                          {(p.tribunal||p.vara)&&<p className="text-xs text-gray-400 mt-0.5">{[p.tribunal,p.vara].filter(Boolean).join(' — ')}</p>}
                          {p.observacoes&&<p className="text-xs text-gray-500 italic mt-1 border-t pt-1">{p.observacoes}</p>}
                        </div>
                        <div className="text-right shrink-0">
                          <p className={`text-sm font-bold ${c.text}`}>{diffLabel(p.data,p.cumprido)}</p>
                        </div>
                      </div>
                    </div>
                  );
                })}
                {selEv.comps.map(c=>{
                  const past=c.data&&parseDate(c.data)<today();
                  return (
                    <div key={c.id} className={`rounded-xl px-4 py-3 border-l-4 border-purple-400 ${c.concluido?'bg-gray-50 opacity-60':past?'bg-red-50':'bg-purple-50'}`}>
                      <div className="flex items-center justify-between gap-2 flex-wrap">
                        <div>
                          <div className="flex items-center gap-2 flex-wrap mb-0.5">
                            {c.tipo&&<span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium">{c.tipo}</span>}
                            {c.concluido&&<span className="text-xs bg-gray-200 text-gray-500 px-2 py-0.5 rounded-full">Concluído</span>}
                            {!c.concluido&&past&&<span className="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full font-bold">Vencido</span>}
                          </div>
                          <p className={`text-sm font-bold text-gray-800 ${c.concluido?'line-through':''}`}>{c.titulo}</p>
                          {c.processo&&<p className="text-xs text-gray-400">Proc. {c.processo}</p>}
                          {c.local&&<p className="text-xs text-gray-500 mt-0.5">📍 {c.local}</p>}
                          {c.descricao&&<p className="text-xs text-gray-500 italic mt-1 border-t pt-1">{c.descricao}</p>}
                        </div>
                        {c.hora&&<div className="text-right shrink-0">
                          <p className="text-lg font-bold text-purple-600">{c.hora}</p>
                        </div>}
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>
      )}
    </div>
  );
}

function getProcuStatus(dataValidade) {
  if (!dataValidade) return 'ativa';
  const d = parseDate(dataValidade);
  const diff = Math.ceil((d - today()) / 86400000);
  if (diff < 0) return 'vencida';
  if (diff <= 60) return 'proxima';
  return 'ativa';
}
