name: Sincronizar publicações FAZ

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Instalar browser Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Extrair publicações
        env:
          FAZ_CPF: ${{ secrets.FAZ_EMAIL }}
          FAZ_SENHA: ${{ secrets.FAZ_SENHA }}
        run: node scripts/sync-publicacoes.mjs

      - name: Upload de artefatos de debug
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-faz-sync
          path: tmp-debug/
          if-no-files-found: ignore

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publicacoes.json
          git diff --cached --quiet || git commit -m "chore: sincroniza publicações FAZ"
          git push
